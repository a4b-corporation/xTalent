    commands:
      - CMD-06 (AddFormField)
    version: "1.0"
    stability: stable

  - id: EVT-007
    name: EventStarted
    es_ref: DE-07
    bounded_context: BC-01
    aggregate: Event
    description: >
      Event transitioned to In Progress. Structural lock (BR-06) is engaged.
      All subsequent structural mutation commands are rejected by the domain.
      This is the primary trigger for all operational contexts to activate.
    payload:
      - field: domain_event_id
        type: uuid
        required: true
      - field: event_id
        type: uuid
        required: true
      - field: started_at
        type: datetime
        required: true
      - field: actor_id
        type: string
        required: true
    triggers:
      - policy: POL-10 (StructuralChangeLock — system sets structural_locked flag)
    consumers:
      - BC-02 (Candidate Registration — blocks new registrations)
      - BC-04 (Schedule & Capacity — locks schedule matrix)
      - BC-05 (Onsite Operations — activates kiosk check-in mode)
      - BC-06 (Interview Management — activates interview mode)
      - BC-08 (Analytics & Audit — log structural lock event)
    commands:
      - CMD-07 (StartEvent)
    version: "1.0"
    stability: stable

  - id: EVT-008
