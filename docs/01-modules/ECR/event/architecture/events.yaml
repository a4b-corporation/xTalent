  # ═══════════════════════════════════════════════════════════════════════════

  - id: EVT-001
    name: EventDraftCreated
    es_ref: DE-01
    bounded_context: BC-01
    aggregate: Event
    description: >
      A new recruitment event has been created in Draft lifecycle state
      via the event creation wizard. The event is not yet visible to candidates.
    payload:
      - field: domain_event_id
        type: uuid
        required: true
      - field: event_id
        type: uuid
        required: true
      - field: title
        type: string
        required: true
      - field: start_date
        type: date
        required: true
      - field: end_date
        type: date
        required: true
      - field: created_by
        type: string
        required: true
      - field: occurred_at
        type: datetime
        required: true
    triggers:
      - policy: none (initial state, no downstream policy)
    consumers:
      - BC-08 (Analytics & Audit — log creation action)
    commands:
      - CMD-01 (CreateEvent)
    version: "1.0"
    stability: stable

  - id: EVT-002
    name: EventPublished
    es_ref: DE-02
    bounded_context: BC-01
    aggregate: Event
    description: >
      Event transitioned from Draft to Published state. Now visible in the event
      registry. Candidates cannot yet register; registration_deadline may trigger
      announcement emails.
    payload:
      - field: domain_event_id
        type: uuid
        required: true
      - field: event_id
        type: uuid
        required: true
      - field: published_at
        type: datetime
        required: true
      - field: actor_id
        type: string
        required: true
    triggers:
      - policy: optional announcement email dispatch (configurable per event)
    consumers:
      - BC-07 (Communication — may trigger bulk announcement if configured)
      - BC-08 (Analytics & Audit — log publish action)
    commands:
      - CMD-02 (PublishEvent)
    version: "1.0"
    stability: stable

  - id: EVT-003
    name: RegistrationOpened
    es_ref: DE-03
    bounded_context: BC-01
    aggregate: Event
    description: >
      Registration window activated. Candidates can now submit registrations.
      BC-02 (Candidate Registration) gates registration acceptance on this event.
    payload:
      - field: domain_event_id
        type: uuid
        required: true
      - field: event_id
        type: uuid
        required: true
      - field: registration_deadline
        type: datetime
        required: false
      - field: actor_id
        type: string
        required: true
      - field: occurred_at
        type: datetime
        required: true
    triggers:
      - policy: none (BC-02 subscribes to gate registration acceptance)
    consumers:
      - BC-02 (Candidate Registration — enables registration acceptance)
      - BC-08 (Analytics & Audit)
    commands:
      - CMD-03 (OpenRegistration)
    version: "1.0"
    stability: stable

  - id: EVT-004
    name: EventCloned
    es_ref: DE-04
    bounded_context: BC-01
    aggregate: Event
    description: >
      A new event was created by cloning an existing event. All structural data
      (tracks, capacities, form schema) copied by value — no runtime reference to
      source (OQ-D5 resolution). Operational data excluded from clone.
    payload:
      - field: domain_event_id
        type: uuid
        required: true
      - field: event_id
        type: uuid
        required: true
        description: ID of the newly created clone
      - field: source_event_id
        type: uuid
        required: true
        description: ID of the source event (traceability only — no runtime dependency)
      - field: new_event_id
        type: uuid
        required: true
      - field: cloned_at
        type: datetime
        required: true
      - field: actor_id
        type: string
        required: true
    triggers:
      - policy: none (clone is independent; no automatic downstream reactions)
    consumers:
      - BC-08 (Analytics & Audit — log clone action with source reference)
    commands:
      - CMD-04 (CloneEvent)
    version: "1.0"
    stability: stable

