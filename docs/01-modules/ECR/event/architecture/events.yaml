    es_ref: DE-15
    bounded_context: BC-02
    aggregate: DuplicateFlag
    description: >
      TA Coordinator resolved a DuplicateFlag with the KEEP_BOTH decision —
      both registrations confirmed as separate individuals. Audit entry created.
    payload:
      - field: domain_event_id
        type: uuid
        required: true
      - field: registration_id
        type: uuid
        required: true
      - field: event_id
        type: uuid
        required: true
      - field: flag_id
        type: uuid
        required: true
      - field: resolution_action
        type: string
        required: true
        description: KEEP_BOTH
      - field: resolved_by
        type: string
        required: true
      - field: occurred_at
        type: datetime
        required: true
    triggers:
      - policy: POL-14-variant (AuditEntryCreated for duplicate resolution)
    consumers:
      - BC-08 (Analytics & Audit — log resolution, AuditAction=DUPLICATE_RESOLVED)
    commands:
      - CMD-13 (ResolveDuplicateKeepBoth)
    version: "1.0"
    stability: stable

