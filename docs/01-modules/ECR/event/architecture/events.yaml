    es_ref: DE-21
    bounded_context: BC-02
    aggregate: CandidateEventRegistration
    description: >
      A candidate registration was cancelled — either candidate-initiated or
      admin-cancelled. If the registration was Confirmed, it vacates a slot and
      triggers waitlist backfill (POL-05). Records are never deleted; only cancelled.
    payload:
      - field: domain_event_id
        type: uuid
        required: true
      - field: registration_id
        type: uuid
        required: true
      - field: event_id
        type: uuid
        required: true
      - field: track_id
        type: uuid
        required: true
      - field: previous_status
        type: string
        required: true
        description: Registration status before cancellation
      - field: cancelled_at
        type: datetime
        required: true
      - field: actor_id
        type: string
        required: true
    triggers:
      - policy: POL-05 (WaitlistBackfillTrigger — if cancelled registration was Confirmed)
    consumers:
