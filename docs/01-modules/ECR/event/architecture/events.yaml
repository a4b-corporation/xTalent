      - policy: none (waitlist backfill triggered by cancellation, not by waitlisting)
    consumers:
      - BC-07 (Communication — sends waitlist notification email)
      - BC-08 (Analytics & Audit)
    commands:
      - System (triggered when track capacity exceeded at registration)
    version: "1.0"
    stability: stable

  - id: EVT-020
    name: WaitlistBackfilled
    es_ref: DE-20
    bounded_context: BC-02
    aggregate: WaitlistEntry
    description: >
      A waitlisted candidate was promoted to Confirmed when a slot vacancy opened
      (POL-05). FCFS ordering: first waitlist position by registeredAt timestamp.
      Maps to WaitlistActivated in LinkML model.
    payload:
      - field: domain_event_id
        type: uuid
        required: true
      - field: registration_id
        type: uuid
        required: true
      - field: event_id
        type: uuid
        required: true
      - field: track_id
        type: uuid
        required: true
      - field: waitlist_id
        type: uuid
        required: true
      - field: activated_at
        type: datetime
        required: true
    triggers:
      - policy: POL-05 (WaitlistBackfillTrigger — automatically on slot vacancy)
    consumers:
      - BC-04 (Schedule & Capacity — triggers slot assignment for activated candidate)
      - BC-07 (Communication — sends waitlist promotion email)
      - BC-08 (Analytics & Audit)
    commands:
      - System (WaitlistBackfillTrigger policy) or CMD-waitlist-confirm (manual)
    version: "1.0"
    stability: stable

  - id: EVT-021
