    name: InterviewScoreSubmitted
    es_ref: DE-39
    bounded_context: BC-06
    aggregate: InterviewScore
    description: >
      Hiring Manager submitted scoring form for a candidate. Score is immediately
      immutable (BR-04). No direct edits permitted post-submission. Audit entry
      required (POL-09).
    payload:
      - field: domain_event_id
        type: uuid
        required: true
      - field: event_id
        type: uuid
        required: true
      - field: score_id
        type: uuid
        required: true
      - field: session_id
        type: uuid
        required: true
      - field: candidate_registration_id
        type: uuid
        required: true
      - field: sbd_number
        type: string
        required: true
      - field: interviewer_user_id
        type: string
        required: true
      - field: total_score
        type: decimal
        required: true
      - field: recommendation
        type: string
        required: true
      - field: submitted_at
        type: datetime
        required: true
    triggers:
      - policy: POL-09 (ScoreLock — score marked immutable)
      - policy: POL-15 (AuditEntryCreated — score submission audit, BR-04)
    consumers:
      - BC-08 (Analytics & Audit — log score, AuditAction=SCORE_SUBMITTED)
    commands:
      - CMD-27 (SubmitInterviewScore)
    version: "1.0"
    stability: stable

  - id: EVT-044
    name: ScoreEditRequested
    es_ref: DE-40
    bounded_context: BC-06
    aggregate: ScoreEditRequest
    description: >
      An interviewer submitted a ScoreEditRequest for a previously submitted
      immutable score. Requires TA Coordinator approval (BR-04).
    payload:
      - field: domain_event_id
        type: uuid
        required: true
      - field: event_id
        type: uuid
        required: true
      - field: edit_request_id
        type: uuid
        required: true
      - field: original_score_id
        type: uuid
        required: true
      - field: session_id
        type: uuid
        required: true
      - field: interviewer_user_id
        type: string
        required: true
      - field: requested_by
        type: string
        required: true
      - field: requested_at
        type: datetime
        required: true
    triggers:
      - policy: POL-15-variant (AuditEntryCreated — score edit requested)
    consumers:
      - BC-07 (Communication — notifies TA Coordinator of pending edit request)
      - BC-08 (Analytics & Audit — log request, AuditAction=SCORE_EDIT_REQUESTED)
    commands:
      - CMD-28 (RequestScoreEdit)
    version: "1.0"
    stability: stable

  - id: EVT-045
    name: ScoreEditApproved
    es_ref: DE-41
    bounded_context: BC-06
    aggregate: ScoreEditRequest
    description: >
      TA Coordinator approved a ScoreEditRequest. A new InterviewScore was created
      with amended values; original score status set to SUPERSEDED. Both scores
      retained for audit. Audit entry required (POL-15, BR-04).
    payload:
      - field: domain_event_id
        type: uuid
        required: true
      - field: event_id
        type: uuid
        required: true
      - field: edit_request_id
        type: uuid
        required: true
      - field: original_score_id
        type: uuid
        required: true
      - field: new_score_id
        type: uuid
        required: true
      - field: session_id
        type: uuid
        required: true
      - field: reviewed_by
        type: string
        required: true
      - field: reviewed_at
        type: datetime
        required: true
    triggers:
      - policy: POL-15 (AuditEntryCreated — score edit approved, BR-04)
    consumers:
      - BC-08 (Analytics & Audit — log approval with both score IDs, AuditAction=SCORE_EDIT_APPROVED)
    commands:
      - CMD-29 (ApproveScoreEdit)
    version: "1.0"
    stability: stable

  - id: EVT-046
    name: ScoreEditRejected
    es_ref: DE-42
    bounded_context: BC-06
    aggregate: ScoreEditRequest
    description: >
      TA Coordinator rejected a ScoreEditRequest. Original score remains
      authoritative. Audit entry required.
    payload:
      - field: domain_event_id
        type: uuid
        required: true
      - field: event_id
        type: uuid
        required: true
      - field: edit_request_id
        type: uuid
        required: true
      - field: original_score_id
        type: uuid
        required: true
      - field: session_id
        type: uuid
        required: true
      - field: reviewed_by
        type: string
        required: true
      - field: reviewed_at
        type: datetime
        required: true
      - field: review_notes
        type: string
        required: false
    triggers:
      - policy: POL-15 (AuditEntryCreated — score edit rejected)
    consumers:
      - BC-08 (Analytics & Audit — log rejection, AuditAction=SCORE_EDIT_REJECTED)
    commands:
      - CMD-30 (RejectScoreEdit)
    version: "1.0"
    stability: stable

  - id: EVT-047
    name: CandidateSkipped
    es_ref: DE-43
    bounded_context: BC-06
    aggregate: InterviewSession
    description: >
      An interviewer marked a candidate as not interviewed (no-show, withdrawal,
      or technical issue). Candidate removed from active queue. Audit entry created.
    payload:
      - field: domain_event_id
        type: uuid
        required: true
      - field: event_id
        type: uuid
        required: true
      - field: session_id
        type: uuid
        required: true
      - field: candidate_registration_id
        type: uuid
        required: true
      - field: sbd_number
        type: string
        required: true
      - field: skip_reason
        type: string
        required: true
      - field: skipped_by
        type: string
        required: true
      - field: occurred_at
        type: datetime
        required: true
    triggers:
      - policy: POL-15 (AuditEntryCreated — skip recorded)
    consumers:
      - BC-08 (Analytics & Audit)
    commands:
      - CMD-31 (SkipCandidate)
    version: "1.0"
    stability: stable

  - id: EVT-048
    name: KitLinkExpired
    es_ref: DE-51
    bounded_context: BC-06
    aggregate: KitLink
    description: >
      Server-side validation detected that a KitLink has passed its expiry_at
      timestamp. Triggered on first rejected request after expiry. All KitLinks
      for an event expire 24h after event day end (BR-05, POL-11).
    payload:
      - field: domain_event_id
        type: uuid
        required: true
      - field: event_id
        type: uuid
        required: true
      - field: kit_link_id
        type: uuid
        required: true
      - field: session_id
        type: uuid
        required: true
      - field: interviewer_user_id
        type: string
        required: true
      - field: expired_at
        type: datetime
        required: true
    triggers:
      - policy: none
    consumers:
      - BC-08 (Analytics & Audit — log expiry, AuditAction=KIT_LINK_EXPIRED)
    commands:
      - System (triggered by first post-expiry kit access attempt, CMD-26)
    version: "1.0"
    stability: stable

  # ═══════════════════════════════════════════════════════════════════════════
  # BC-07: COMMUNICATION
  # Aggregates: CommunicationJob, EmailTemplate, DeliveryRecord
  # ES events: DE-36 (via SessionDigestDispatched subscription), DE-46, DE-48
  # ═══════════════════════════════════════════════════════════════════════════

  - id: EVT-049
    name: CommunicationJobCreated
    es_ref: DE-46 (bulk variant) / various (triggered by domain events)
    bounded_context: BC-07
    aggregate: CommunicationJob
    description: >
      A CommunicationJob was created and queued. Bulk or targeted dispatch.
      Idempotent: duplicate triggering events with same idempotency_key are ignored.
      Rate-limited to 500 recipients/minute (NFR-07).
    payload:
      - field: domain_event_id
        type: uuid
        required: true
      - field: event_id
        type: uuid
        required: true
      - field: job_id
        type: uuid
        required: true
      - field: job_type
        type: string
        required: true
      - field: trigger_event_type
        type: string
        required: true
      - field: recipient_count
        type: integer
        required: true
      - field: occurred_at
        type: datetime
        required: true
    triggers:
      - policy: none
    consumers:
      - BC-08 (Analytics & Audit — log bulk email initiation, AuditAction=BULK_EMAIL_INITIATED)
    commands:
      - CMD-34 (DispatchBulkInvitations), CMD-25 (SendSessionDigests — via event subscription)
    version: "1.0"
    stability: stable

  - id: EVT-050
    name: EmailDispatched
    es_ref: null (internal BC-07 event)
    bounded_context: BC-07
    aggregate: DeliveryRecord
    description: >
      An individual email was submitted to the Email Delivery Service.
      One event per DeliveryRecord transition from QUEUED to SENT.
    payload:
      - field: domain_event_id
        type: uuid
        required: true
      - field: event_id
        type: uuid
        required: true
      - field: job_id
        type: uuid
        required: true
      - field: delivery_record_id
        type: uuid
        required: true
      - field: email_address
        type: string
        required: true
      - field: external_message_id
        type: string
        required: false
      - field: occurred_at
        type: datetime
        required: true
    triggers:
      - policy: none
    consumers:
      - BC-08 (Analytics & Audit)
    version: "1.0"
    stability: stable

  - id: EVT-051
    name: EmailDelivered
    es_ref: null (BC-07 internal — from delivery webhook)
    bounded_context: BC-07
    aggregate: DeliveryRecord
    description: >
      Delivery webhook confirmed successful receipt by the recipient mail server.
      DeliveryRecord transitions from SENT to DELIVERED.
    payload:
      - field: domain_event_id
        type: uuid
        required: true
      - field: event_id
        type: uuid
        required: true
      - field: job_id
        type: uuid
        required: true
      - field: delivery_record_id
        type: uuid
        required: true
      - field: email_address
        type: string
        required: true
      - field: delivered_at
        type: datetime
        required: true
    triggers:
      - policy: none
    consumers:
      - BC-08 (Analytics & Audit)
    version: "1.0"
    stability: stable

  - id: EVT-052
    name: EmailFailed
    es_ref: null (BC-07 internal — terminal delivery failure)
    bounded_context: BC-07
    aggregate: DeliveryRecord
    description: >
      A DeliveryRecord reached terminal failure state (BOUNCED or FAILED after
      all retries). FailureEscalation triggered — TA Coordinator notified.
      Must never be silently dropped per BC-07 invariant.
    payload:
      - field: domain_event_id
        type: uuid
        required: true
      - field: event_id
        type: uuid
        required: true
      - field: job_id
        type: uuid
        required: true
      - field: delivery_record_id
        type: uuid
        required: true
      - field: email_address
        type: string
        required: true
      - field: failure_reason
        type: string
        required: true
      - field: delivery_status
        type: string
        required: true
        description: BOUNCED or FAILED
      - field: occurred_at
        type: datetime
        required: true
    triggers:
      - policy: FailureEscalation (alert TA Coordinator; never silent)
    consumers:
      - BC-07 (internal — triggers TA Coordinator alert)
      - BC-08 (Analytics & Audit — log delivery failure, AuditAction=DELIVERY_FAILED)
    version: "1.0"
    stability: stable

  - id: EVT-053
    name: TemplatePublished
    es_ref: null (BC-07 template management)
    bounded_context: BC-07
    aggregate: EmailTemplate
    description: >
      A new TemplateVersion was published and set to ACTIVE. Previous version
      deprecated. Immutable once published.
    payload:
      - field: domain_event_id
        type: uuid
        required: true
      - field: event_id
        type: uuid
        required: false
        description: Null for global templates not scoped to an event
      - field: template_id
        type: uuid
        required: true
      - field: version_number
        type: integer
        required: true
      - field: template_purpose
        type: string
        required: true
      - field: published_by
        type: string
        required: true
      - field: occurred_at
        type: datetime
        required: true
    triggers:
      - policy: none
    consumers:
      - BC-08 (Analytics & Audit)
    commands:
      - CMD-publish-template (TA Coordinator / template manager)
    version: "1.0"
    stability: stable

  # ═══════════════════════════════════════════════════════════════════════════
  # BC-08: ANALYTICS & AUDIT (Terminal Consumer — publishes no domain events)
  # Internally generated events for observability only
  # ES events: DE-52, DE-53, DE-54
  # ═══════════════════════════════════════════════════════════════════════════

  - id: EVT-054
    name: AuditEntryCreated
    es_ref: DE-52
    bounded_context: BC-08
    aggregate: AuditEntry
    description: >
      An immutable, tamper-evident AuditEntry was written to the audit store.
      Triggered for every consequential action in any BC. Append-only;
      hash-chain integrity maintained. Retention minimum 3 years (NFR-10).
      BC-08 is a terminal consumer — this event is NOT published to Pub/Sub.
      It is an internal BC-08 artifact.
    payload:
      - field: audit_entry_id
        type: uuid
        required: true
      - field: source_event_id
        type: string
        required: true
      - field: source_event_type
        type: string
        required: true
      - field: source_bc
        type: string
        required: true
      - field: audit_action
        type: string
        required: true
      - field: ecr_event_id
        type: uuid
        required: true
      - field: actor_user_id
        type: string
        required: true
      - field: actor_role
        type: string
        required: true
      - field: content_hash
        type: string
        required: true
      - field: chain_hash
        type: string
        required: true
      - field: recorded_at
        type: datetime
        required: true
    triggers:
      - policy: none (BC-08 is terminal)
    consumers:
      - none (BC-08 is terminal consumer; no downstream)
    note: "This event is internal to BC-08 and not published on the Pub/Sub backbone. Included for completeness matching ES event DE-52."
    version: "1.0"
    stability: stable

# ─────────────────────────────────────────────────────────────────────────────
# ADDITIONAL ES EVENTS MAPPING
# Events DE-38, DE-44, DE-45, DE-47, DE-49, DE-50 mapped to supporting events
# in existing BC-06 and BC-07 categories above.
# ─────────────────────────────────────────────────────────────────────────────
# DE-38 (CandidateInterviewed):  Operational transition in BC-06, represented
#                                by queue state change. Not a separate published
#                                domain event — surfaced via InterviewKitAccessed
#                                and InterviewScoreSubmitted lifecycle.
# DE-44 (CandidateDeferred):    Operational queue reordering in BC-06.
#                                Captured as an internal session queue event;
#                                not a published domain event in LinkML model.
# DE-45 (BulkAdvancementRun):   BC-02 bulk operation; state change on multiple
#                                CandidateEventRegistrations. Represented by
#                                multiple RegistrationCancelled / CandidateConfirmed
#                                events with a bulk run context payload.
# DE-47 (BulkOutcomeRecorded):  BC-06 bulk scoring outcome. Represented by
#                                multiple InterviewScoreSubmitted events with a
#                                bulk run context payload. Audit entry created.
# DE-49 (CandidatePassedEvent): Outcome field update on CandidateEventRegistration
#                                in BC-02. Represented by UpdateRegistrationStatus
#                                with pipeline_stage advancement.
# DE-50 (CandidateFailedEvent): Same as DE-49 for fail outcome.
# DE-53 (ReportGenerated):      Ephemeral analytics event in BC-08. Not published
#                                to Pub/Sub; internal to BC-08.
# DE-54 (DashboardRefreshed):   Real-time projection update in BC-08 metrics
#                                store. Not a domain event; internal projection
#                                update triggered by all relevant subscribed events.
# ─────────────────────────────────────────────────────────────────────────────

# ─────────────────────────────────────────────────────────────────────────────
# EVENT TOPOLOGY SUMMARY
# ─────────────────────────────────────────────────────────────────────────────
event_topology:
  pub_sub_topics:
    - topic: ecr.event-management
      publishers: [BC-01]
      events: [EVT-001, EVT-002, EVT-003, EVT-004, EVT-005, EVT-006, EVT-007, EVT-008, EVT-009]
      subscribers: [BC-02, BC-04, BC-05, BC-06, BC-07, BC-08]

    - topic: ecr.candidate-registration
      publishers: [BC-02]
      events: [EVT-010, EVT-011, EVT-012, EVT-013, EVT-014, EVT-015, EVT-016, EVT-017, EVT-018, EVT-019, EVT-020, EVT-021]
      subscribers: [BC-03, BC-04, BC-05, BC-06, BC-07, BC-08]

    - topic: ecr.assessment
      publishers: [BC-03 ACL Adapter]
      events: [EVT-022, EVT-023, EVT-024, EVT-025, EVT-026]
      subscribers: [BC-06, BC-08]

    - topic: ecr.schedule-capacity
      publishers: [BC-04]
      events: [EVT-027, EVT-028, EVT-029, EVT-030, EVT-031, EVT-032]
      subscribers: [BC-02, BC-05, BC-06, BC-07, BC-08]

    - topic: ecr.onsite-operations
      publishers: [BC-05]
      events: [EVT-033, EVT-034, EVT-035, EVT-036, EVT-037, EVT-038, EVT-039]
      subscribers: [BC-03, BC-06, BC-07, BC-08]

    - topic: ecr.interview-management
      publishers: [BC-06]
      events: [EVT-040, EVT-041, EVT-042, EVT-043, EVT-044, EVT-045, EVT-046, EVT-047, EVT-048]
      subscribers: [BC-07, BC-08]

    - topic: ecr.communication
      publishers: [BC-07]
      events: [EVT-049, EVT-050, EVT-051, EVT-052, EVT-053]
      subscribers: [BC-08]

  terminal_consumers:
    - BC-08 (Analytics & Audit) subscribes to ALL topics

  internal_only_events:
    - EVT-054 (AuditEntryCreated) — BC-08 internal; not on Pub/Sub backbone
