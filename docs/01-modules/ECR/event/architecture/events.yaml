    stability: stable

  - id: EVT-017
    name: DuplicateRejected
    es_ref: DE-17
    bounded_context: BC-02
    aggregate: DuplicateFlag
    description: >
      TA Coordinator resolved a DuplicateFlag keeping the matched registration and
      cancelling this registration (KEEP_MATCHED resolution action).
    payload:
      - field: domain_event_id
        type: uuid
        required: true
      - field: registration_id
        type: uuid
        required: true
      - field: event_id
        type: uuid
        required: true
      - field: flag_id
        type: uuid
        required: true
      - field: matched_registration_id
        type: uuid
        required: true
      - field: resolution_action
        type: string
        required: true
        description: KEEP_MATCHED
      - field: resolved_by
        type: string
        required: true
      - field: occurred_at
