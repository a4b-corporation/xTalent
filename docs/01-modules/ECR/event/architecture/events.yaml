    es_ref: DE-08
    bounded_context: BC-01
    aggregate: Event
    description: >
      Event transitioned from In Progress to Closed. No further operational
      changes. Session Digest links will expire 24h after close (POL-11, BR-05).
    payload:
      - field: domain_event_id
        type: uuid
        required: true
      - field: event_id
        type: uuid
        required: true
      - field: actor_id
        type: string
        required: true
      - field: occurred_at
        type: datetime
        required: true
    triggers:
