  - id: EVT-010
    name: CandidateRegisteredOnline
    es_ref: DE-10
    bounded_context: BC-02
    aggregate: CandidateEventRegistration
    description: >
      A candidate submitted the online registration form and was assigned an SBD.
      Duplicate detection runs immediately (POL-03). Maps to CandidateRegistered
      domain event in LinkML model.
    payload:
      - field: domain_event_id
        type: uuid
        required: true
      - field: registration_id
        type: uuid
        required: true
      - field: event_id
        type: uuid
        required: true
      - field: track_id
        type: uuid
        required: true
      - field: sbd_number
        type: string
        required: true
      - field: registration_source
        type: string
        required: true
        description: Always ONLINE for this event
      - field: occurred_at
        type: datetime
        required: true
    triggers:
      - policy: POL-01 (AutoSBDAssignment — SBD already assigned at capture, BR-01)
      - policy: POL-03 (DuplicateDetectionCheck — multi-factor matching)
    consumers:
      - BC-04 (Schedule & Capacity — candidate available for slot allocation on confirmation)
      - BC-07 (Communication — triggers confirmation email on CandidateConfirmed)
      - BC-08 (Analytics & Audit — log registration)
    commands:
      - CMD-09 (RegisterCandidateOnline)
    version: "1.0"
    stability: stable

