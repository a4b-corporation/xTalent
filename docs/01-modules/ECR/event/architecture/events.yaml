  - id: EVT-018
    name: CandidateConfirmed
    es_ref: DE-18
    bounded_context: BC-02
    aggregate: CandidateEventRegistration
    description: >
      Registration status transitioned to Confirmed. Candidate is eligible for
      slot allocation and assessment dispatch (BR-07). Triggers slot allocation
      in Schedule & Capacity BC and confirmation email in Communication BC.
    payload:
      - field: domain_event_id
        type: uuid
        required: true
      - field: registration_id
        type: uuid
        required: true
      - field: event_id
        type: uuid
        required: true
      - field: track_id
        type: uuid
        required: true
      - field: confirmed_at
        type: datetime
        required: true
      - field: actor_id
        type: string
        required: true
