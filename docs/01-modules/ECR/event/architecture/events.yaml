  - id: EVT-014
    name: DuplicateFlagRaised
    es_ref: DE-14
    bounded_context: BC-02
    aggregate: DuplicateFlag
    description: >
      Multi-factor duplicate detection found a potential match for a new registration.
      Human review required (BR-02). Unresolved flags block bulk advancement (BR-03).
      TA Coordinator is notified (POL-04).
    payload:
      - field: domain_event_id
        type: uuid
        required: true
      - field: registration_id
        type: uuid
        required: true
      - field: event_id
        type: uuid
        required: true
      - field: flag_id
        type: uuid
        required: true
      - field: matched_registration_id
        type: uuid
        required: true
      - field: match_dimensions
        type: array
        required: true
        description: Which dedup dimensions matched (PHONE, STUDENT_ID, BOTH)
      - field: occurred_at
        type: datetime
        required: true
    triggers:
      - policy: POL-04 (DuplicateNotificationToCoordinator — notify TA Coordinator)
    consumers:
      - BC-07 (Communication — sends duplicate flag notification to TA Coordinator)
      - BC-08 (Analytics & Audit — log duplicate flag)
    commands:
      - System (triggered by duplicate detection on registration capture)
    version: "1.0"
    stability: stable

  - id: EVT-015
