  - id: EVT-019
    name: CandidateWaitlisted
    es_ref: DE-19
    bounded_context: BC-02
    aggregate: WaitlistEntry
    description: >
      Track capacity was full when the candidate registered; candidate placed on
      waitlist with FCFS position. FCFS ordering by registeredAt timestamp (BR-10).
    payload:
      - field: domain_event_id
        type: uuid
        required: true
      - field: registration_id
        type: uuid
        required: true
      - field: event_id
        type: uuid
        required: true
      - field: track_id
        type: uuid
        required: true
      - field: waitlist_id
        type: uuid
        required: true
      - field: waitlist_position
        type: integer
        required: true
      - field: waitlisted_at
        type: datetime
        required: true
