# ECR Module — Domain Event Repository
# xTalent HCM Solution | 2026-03-25
#
# Aggregates all domain events from:
#   - Event Storming (event-storming.md, DE-01 to DE-54)
#   - Bounded Context definitions (bounded-contexts.md)
#   - LinkML domain models (model.linkml.yaml per BC)
#   - Use case flows (flows/*.flow.md per BC)
#
# Events are organized by Bounded Context.
# Each event references its Event Storming ID (ES-ID) where applicable.
# Consumers are BCs or external systems that subscribe to each event.

version: "1.0"
module: ecr
generated: "2026-03-25"

# ─────────────────────────────────────────────────────────────────────────────
# EVENT SUMMARY
# ─────────────────────────────────────────────────────────────────────────────
# Total events cataloged: 54
# BC-01 (Event Management):    9 events  (EVT-001 to EVT-009)
# BC-02 (Candidate Reg):      12 events  (EVT-010 to EVT-021)
# BC-03 (Assessment):          5 events  (EVT-022 to EVT-026)
# BC-04 (Schedule & Capacity): 6 events  (EVT-027 to EVT-032)
# BC-05 (Onsite Operations):   7 events  (EVT-033 to EVT-039)
# BC-06 (Interview Mgmt):      9 events  (EVT-040 to EVT-048)
# BC-07 (Communication):       5 events  (EVT-049 to EVT-053)
# BC-08 (Analytics & Audit):   1 event   (EVT-054)
# ─────────────────────────────────────────────────────────────────────────────

events:

