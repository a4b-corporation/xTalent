    consumers:
      - BC-06 (Interview Management — schedules KitLink expiry job)
      - BC-08 (Analytics & Audit — log close action)
    commands:
      - CMD-08 (CloseEvent)
    version: "1.0"
    stability: stable

  - id: EVT-009
    name: EventArchived
    es_ref: DE-09
    bounded_context: BC-01
    aggregate: Event
    description: >
      Event moved to Archived state for long-term retention. Administrative action
      after event is Closed. Audit log preserved for minimum 3 years (NFR-10).
    payload:
      - field: domain_event_id
        type: uuid
        required: true
      - field: event_id
        type: uuid
        required: true
      - field: actor_id
        type: string
        required: true
      - field: occurred_at
        type: datetime
        required: true
    triggers:
      - policy: none (archive is terminal; no downstream reactions required)
    consumers:
      - BC-08 (Analytics & Audit — log archive action)
    commands:
      - System scheduled or CMD-archive (TA Coordinator action)
    version: "1.0"
    stability: stable

  # ═══════════════════════════════════════════════════════════════════════════
