id: https://xtalent.vng.com.vn/ecr/event-management
name: ECREventManagement
description: >-
  Domain model for the Event Management bounded context of the ECR module.
  This context owns the Event lifecycle, Track configuration, RegistrationForm schema,
  and publishes the domain events that all downstream contexts consume.

prefixes:
  linkml: https://w3id.org/linkml/
  ecr: https://xtalent.vng.com.vn/ecr/
  ecr_em: https://xtalent.vng.com.vn/ecr/event-management/

default_prefix: ecr_em
default_range: string

imports:
  - linkml:types

classes:

  # ── Aggregate Root ──────────────────────────────────────────────────────────

  Event:
    tree_root: true
    description: >-
      The primary organizing entity of the ECR module. Represents a scheduled
      mass recruitment activity. All other aggregates reference an Event by ID.
    slots:
      - event_id
      - title
      - description
      - start_date
      - end_date
      - registration_deadline
      - lifecycle_state
      - structural_locked
      - created_by
      - created_at
      - updated_at
      - source_event_id
    slot_usage:
      event_id:
        required: true
      title:
        required: true
      start_date:
        required: true
      end_date:
        required: true
      lifecycle_state:
        required: true
      structural_locked:
        required: true
      created_by:
        required: true
      created_at:
        required: true

  # ── Entities (children of Event) ────────────────────────────────────────────

  Track:
    description: >-
      A named pipeline configuration within an Event, representing a distinct
      job family or role category with its own capacity and pipeline stages.
    slots:
      - track_id
      - event_id
      - name
      - capacity
      - pipeline_stages
      - job_requisition_link
      - allocation_strategy
      - created_at
    slot_usage:
      track_id:
        required: true
      event_id:
        required: true
      name:
        required: true
      capacity:
        required: true

  RegistrationForm:
    description: >-
      Defines the schema of fields presented to candidates during registration.
      Scoped to one Event. Copied by value during event cloning.
    slots:
      - form_id
      - event_id
      - fields
      - version
      - created_at
      - updated_at
    slot_usage:
      form_id:
        required: true
      event_id:
        required: true
      fields:
        required: true
      version:
        required: true

  FormField:
    description: >-
      A single field definition within a RegistrationForm, including type,
      label, validation rules, and ordering.
    slots:
      - field_id
      - field_type
      - label
      - is_required
      - validation_rules
      - display_order
    slot_usage:
      field_id:
        required: true
      field_type:
        required: true
      label:
        required: true
      is_required:
        required: true
      display_order:
        required: true

  EventPhase:
    description: >-
      Value object describing the operational context of the Event's current
      lifecycle state. Derived from lifecycle_state; not independently assigned.
    slots:
      - phase_name
      - permitted_operations
      - structural_mutations_allowed

  # ── Domain Events (published language) ──────────────────────────────────────

  EventDomainEvent:
    description: >-
      Base class for all domain events published by the Event Management context.
      All downstream contexts consume these events.
    slots:
      - domain_event_id
      - event_id
      - occurred_at
      - actor_id
    slot_usage:
      domain_event_id:
        required: true
      event_id:
        required: true
      occurred_at:
        required: true
      actor_id:
        required: true

  EventPublishedEvent:
    is_a: EventDomainEvent
    description: Emitted when an Event transitions from Draft to Published state.
    slots:
      - published_at

  EventStartedEvent:
    is_a: EventDomainEvent
    description: >-
      Emitted when an Event transitions to In Progress. Structural lock is
      engaged at this point. All downstream contexts receive this event.
    slots:
      - started_at

  TrackAddedEvent:
    is_a: EventDomainEvent
    description: Emitted when a new Track is appended to an Event before In Progress.
    slots:
      - track_id
      - track_name
      - track_capacity

  EventClonedEvent:
    is_a: EventDomainEvent
    description: >-
      Emitted when an Event is cloned. new_event_id identifies the clone.
      The clone has no runtime dependency on the source event.
    slots:
      - new_event_id
      - cloned_at

# ── Slots ────────────────────────────────────────────────────────────────────

slots:

  event_id:
    range: string
    description: Unique identifier for an Event (UUID).

  title:
    range: string
    description: Human-readable name of the Event.

  description:
    range: string
    description: Optional narrative description of the Event.

  start_date:
    range: date
    description: The date when the Event activity begins.

  end_date:
    range: date
    description: The date when the Event activity ends.

  registration_deadline:
    range: datetime
    description: Cutoff timestamp for candidate registrations.

  lifecycle_state:
    range: EventLifecycleState
    description: Current state in the Event lifecycle state machine.

  structural_locked:
    range: boolean
    description: >-
      True when the Event is In Progress or beyond. When true, structural
      mutation commands are rejected by the aggregate.

  created_by:
    range: string
    description: xTalent User ID of the TA Coordinator who created the Event.

  created_at:
    range: datetime
    description: Timestamp when the record was created.

  updated_at:
    range: datetime
    description: Timestamp of the most recent update.

  source_event_id:
    range: string
    description: >-
      Optional. If this Event was created by cloning, references the source
      event ID for traceability. No runtime dependency on the source.

  track_id:
    range: string
    description: Unique identifier for a Track (UUID).

  name:
    range: string
    description: Human-readable name.

  capacity:
    range: integer
    description: Maximum number of confirmed candidates for this Track.
    minimum_value: 1

  pipeline_stages:
    range: string
    multivalued: true
    description: Ordered list of stage names in this Track's recruitment pipeline.

  job_requisition_link:
    range: string
    description: >-
      Optional. xTalent Job Request ID linked to this Track. Not required
      for all tracks in MVP.

  allocation_strategy:
    range: AllocationStrategyEnum
    description: Algorithm used to allocate candidates to schedule slots for this Track.

  form_id:
    range: string
    description: Unique identifier for a RegistrationForm (UUID).

  fields:
    range: FormField
    multivalued: true
    inlined_as_list: true
    description: Ordered list of field definitions in the form.

  version:
    range: integer
    description: Monotonically increasing version number for the form schema.

  field_id:
    range: string
    description: Unique identifier for a FormField within a form.

  field_type:
    range: FormFieldType
    description: Data type and input widget type for the field.

  label:
    range: string
    description: Display label shown to the candidate.

  is_required:
    range: boolean
    description: Whether this field must be filled for a valid registration submission.

  validation_rules:
    range: string
    description: >-
      JSON-serialized validation rule set (min length, regex, etc.) for this field.

  display_order:
    range: integer
    description: Ascending integer controlling field display sequence.

  phase_name:
    range: string
    description: Human-readable name of the operational phase.

  permitted_operations:
    range: string
    multivalued: true
    description: List of operation names permitted in this phase.

  structural_mutations_allowed:
    range: boolean
    description: Whether structural mutations are permitted in this phase.

  domain_event_id:
    range: string
    description: Unique identifier for a domain event message (UUID).

  occurred_at:
    range: datetime
    description: Timestamp when the domain event occurred.

  actor_id:
    range: string
    description: xTalent User ID of the actor who triggered the event.

  published_at:
    range: datetime
    description: Timestamp when the Event was published.

  started_at:
    range: datetime
    description: Timestamp when the Event started (In Progress transition).

  track_name:
    range: string
    description: Name of the track in a domain event payload.

  track_capacity:
    range: integer
    description: Capacity of the track in a domain event payload.

  new_event_id:
    range: string
    description: Event ID of the newly created clone.

  cloned_at:
    range: datetime
    description: Timestamp when the clone was created.

# ── Enumerations ─────────────────────────────────────────────────────────────

enums:

  EventLifecycleState:
    description: The states in the Event lifecycle state machine.
    permissible_values:
      DRAFT:
        description: Event created; visible only to TA Coordinators.
      PUBLISHED:
        description: Event visible to candidates; registrations not yet open.
      REGISTRATION_OPEN:
        description: Candidates can submit registrations.
      IN_PROGRESS:
        description: Event is actively running; structural mutations locked (BR-06).
      CLOSED:
        description: Event concluded; no further operational changes.
      ARCHIVED:
        description: Event stored for historical and audit access only.

  AllocationStrategyEnum:
    description: Algorithm used to distribute candidates across schedule slots.
    permissible_values:
      ROUND_ROBIN:
        description: Distribute candidates evenly across all available slots.
      FILL_FIRST:
        description: Fill each slot to capacity before moving to the next.

  FormFieldType:
    description: Supported input field types in a RegistrationForm.
    permissible_values:
      TEXT:
        description: Single-line text input.
      TEXTAREA:
        description: Multi-line text input.
      EMAIL:
        description: Email address input with format validation.
      PHONE:
        description: Phone number input with Vietnamese format validation.
      DATE:
        description: Date picker.
      SELECT:
        description: Single-select dropdown.
      MULTISELECT:
        description: Multi-select checkbox group.
      FILE_UPLOAD:
        description: File attachment (CV upload).
      STUDENT_ID:
        description: Student identification number — used as dedup key dimension.
