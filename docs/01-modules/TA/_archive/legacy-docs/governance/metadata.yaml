  ta: https://xtalent.com/ta/
  xsd: http://www.w3.org/2001/XMLSchema#

# ============================================================================
# MODULE INFORMATION
# ============================================================================

module:
  id: odsa.ta
  name: Time & Attendance - Absence Module
  short_name: TA-Absence
  version: 1.0.0
  status: ACTIVE

  description: |
    Module quản lý nghỉ phép (Leave Management) trong hệ thống xTalent.
    Cung cấp khả năng cấu hình leave types, classes, policies; quản lý
    leave accounts, movements, requests; và tự động hóa accrual, carry-forward,
    expiry thông qua event-driven architecture.

  domain: Human Capital Management (HCM)
  sub_domain: Time & Attendance

