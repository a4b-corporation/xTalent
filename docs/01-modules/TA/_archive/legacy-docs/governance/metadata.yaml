      description: Timesheet integration
      dependency_type: CONSUMER

    - module: Analytics/BI
      description: Leave analytics and reporting
      dependency_type: CONSUMER

# ============================================================================
# CHANGE MANAGEMENT
# ============================================================================

change_management:
  modification_process: |
    1. Create change request with business justification
    2. Review by ontology reviewer (LinkML validation)
    3. Review by domain owner (business impact)
    4. Review by technical owner (technical feasibility)
    5. Update version in this metadata file
    6. Run linkml-validate on all YAML files
    7. Update change history below
    8. Merge to main branch

  validation_commands: |
    # Validate all LinkML YAML files
    linkml-validate TA/ontology/concepts/*.yaml
    linkml-lint TA/ontology/concepts/*.yaml

    # Validate OpenAPI spec
    openapi-validate TA/system/canonical_api.openapi.yaml

  approval_required_for:
    - New entity creation
    - Entity deletion
    - Relationship changes
    - Lifecycle state changes
    - Business rule additions/removals
    - API contract changes

