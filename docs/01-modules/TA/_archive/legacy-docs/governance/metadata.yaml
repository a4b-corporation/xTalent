# ============================================================================
# VERSION HISTORY
# ============================================================================

version_history:
  - version: 1.0.0
    date: 2026-03-09
    status: CURRENT
    author: AI Assistant
    description: |
      Initial release of ODDS v1 compliant Absence Ontology.

      **Changes:**
      - Created 16 entity LinkML YAML files in ontology/concepts/
      - Created ontology/relationships.yaml (cross-entity relationships)
      - Created ontology/lifecycle.yaml (state machines)
      - Created ontology/rules.yaml (business rules)
      - Created design/purpose.md (module purpose & scope)
      - Created design/use_cases.md (13 use cases)
      - Created design/workflows.md (6 core workflows)
      - Created design/api_intent.md (canonical API design)
      - Created system/canonical_api.openapi.yaml (OpenAPI 3.0 spec)
      - Created system/events.yaml (domain events)
      - Created governance/metadata.yaml (this file)

      **Key Fixes from Previous Version:**
      - Fixed hierarchy: LeaveType → LeaveClass (was inverted)
      - Restored LeavePolicy entity (was removed)
      - Added missing entities: LeaveInstant, LeaveInstantDetail, LeaveEventDef,
        LeaveEventRun, LeaveClassEvent, LeaveBalanceHistory, TeamLeaveLimit,
        LeaveWallet
      - Aligned all attributes with FSD+DBML canonical model
      - Added proper cardinality to all relationships
      - Defined complete lifecycle state machines
      - Documented 8 leave business rules

  - version: 0.9.0
    date: 2025-11-xx
    status: SUPERSEDED
    author: Previous Team
    description: |
      Legacy ontology (entities v1) - archived to _archive/00-ontology/

      **Known Issues:**
      - Inverted hierarchy: LeaveClass → LeaveType (incorrect)
      - Missing entities: LeaveInstant, LeaveInstantDetail, Events, etc.
      - Attribute mismatches with FSD+DBML
      - Incomplete relationships and lifecycle definitions

