# ─────────────────────────────────────────────────────────────────────────────
# COMPONENTS
# ─────────────────────────────────────────────────────────────────────────────

components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    ResourceId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ActiveFilter:
      name: active
      in: query
      schema:
        type: boolean
    CountryCodeFilter:
      name: country_code
      in: query
      schema:
        type: string
        pattern: '^[A-Z]{2}$'
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 1
        minimum: 1
    PageSizeParam:
      name: page_size
      in: query
      schema:
        type: integer
        default: 20
        maximum: 100

  responses:
    BadRequest:
      description: Bad request — invalid input
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing or invalid JWT
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnprocessableEntity:
      description: Business rule violation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:

    ErrorResponse:
      type: object
      properties:
        error_code:
          type: string
        message:
          type: string
        request_id:
          type: string

    # ── ta.absence schemas ─────────────────────────────────────────────────────

    LeaveType:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        code:
          type: string
        name_vn:
          type: string
        name_en:
          type: string
        leave_category:
          type: string
          enum: [ANNUAL, SICK, MATERNITY, PATERNITY, UNPAID, COMP_TIME, CUSTOM]
        entitlement_basis:
          type: string
          enum: [FIXED, ACCRUAL, UNLIMITED]
        unit:
          type: string
          enum: [DAY, HOUR]
        allow_half_day:
          type: boolean
        allow_advance_leave:
          type: boolean
        carryover_eligible:
          type: boolean
        encashment_eligible:
          type: boolean
        evidence_required:
          type: boolean
        evidence_grace_period_days:
          type: integer
        country_code:
          type: string
        active:
          type: boolean
        cancellation_deadline_days:
          type: integer
          description: H-P0-001
        expiry_action:
          type: string
          enum: [EXTENSION, CASHOUT, FORFEITURE]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    LeaveTypeWrite:
      type: object
      required: [code, name_en, leave_category, entitlement_basis, unit, country_code, cancellation_deadline_days]
      properties:
        code:
          type: string
          maxLength: 64
        name_vn:
          type: string
        name_en:
          type: string
        leave_category:
          type: string
          enum: [ANNUAL, SICK, MATERNITY, PATERNITY, UNPAID, COMP_TIME, CUSTOM]
        entitlement_basis:
          type: string
          enum: [FIXED, ACCRUAL, UNLIMITED]
        unit:
          type: string
          enum: [DAY, HOUR]
        allow_half_day:
          type: boolean
          default: false
        allow_advance_leave:
          type: boolean
          default: false
        carryover_eligible:
          type: boolean
          default: false
        encashment_eligible:
          type: boolean
          default: false
        evidence_required:
          type: boolean
          default: false
        evidence_grace_period_days:
          type: integer
        country_code:
          type: string
          default: "VN"
        cancellation_deadline_days:
          type: integer
          default: 1
        expiry_action:
          type: string
          enum: [EXTENSION, CASHOUT, FORFEITURE]

    LeaveTypeListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/LeaveType'
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer

    LeavePolicy:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        policy_name:
          type: string
        leave_type_id:
          type: string
          format: uuid
        leave_class_id:
          type: string
          format: uuid
        eligibility_scope:
          type: string
          enum: [ALL, JOB_GRADE, DEPARTMENT, EMPLOYMENT_TYPE]
        probation_eligible:
          type: boolean
        probation_period_days:
          type: integer
        accrual_plan_id:
          type: string
          format: uuid
        carryover_rule_id:
          type: string
          format: uuid
        effective_date:
          type: string
          format: date
        expiry_date:
          type: string
          format: date
        seniority_rules:
          type: array
          items:
            type: object
            properties:
              min_years_of_service:
                type: integer
              max_years_of_service:
                type: integer
              entitlement_days:
                type: number
        active:
          type: boolean

    LeavePolicyWrite:
      type: object
      required: [policy_name, leave_type_id, eligibility_scope, effective_date]
      properties:
        policy_name:
          type: string
        leave_type_id:
          type: string
          format: uuid
        leave_class_id:
          type: string
          format: uuid
        eligibility_scope:
          type: string
          enum: [ALL, JOB_GRADE, DEPARTMENT, EMPLOYMENT_TYPE]
        probation_eligible:
          type: boolean
        probation_period_days:
          type: integer
        accrual_plan_id:
          type: string
          format: uuid
        carryover_rule_id:
          type: string
          format: uuid
        effective_date:
          type: string
          format: date
        expiry_date:
          type: string
          format: date
        seniority_rules:
          type: array
          items:
            type: object

    LeavePolicyListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/LeavePolicy'
        total:
          type: integer

    LeaveClass:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        members:
          type: array
          items:
            type: object
            properties:
              leave_type_id:
                type: string
                format: uuid
              rank_order:
                type: integer

    LeaveClassWrite:
      type: object
      required: [name, members]
      properties:
        name:
          type: string
        description:
          type: string
        members:
          type: array
          items:
            type: object
            required: [leave_type_id, rank_order]
            properties:
              leave_type_id:
                type: string
                format: uuid
              rank_order:
                type: integer

    AccrualPlan:
      type: object
      properties:
        id:
          type: string
          format: uuid
        plan_name:
          type: string
        accrual_method:
          type: string
          enum: [MONTHLY_PRO_RATA, ANNUAL_FRONT_LOAD, TENURE_BASED]
        amount_per_period:
          type: number
        accrual_frequency:
          type: string
          enum: [MONTHLY, QUARTERLY, ANNUALLY]
        max_balance:
          type: number
        active:
          type: boolean

    AccrualPlanWrite:
      type: object
      required: [plan_name, accrual_method, amount_per_period, accrual_frequency]
      properties:
        plan_name:
          type: string
        accrual_method:
          type: string
          enum: [MONTHLY_PRO_RATA, ANNUAL_FRONT_LOAD, TENURE_BASED]
        amount_per_period:
          type: number
        accrual_frequency:
          type: string
          enum: [MONTHLY, QUARTERLY, ANNUALLY]
        max_balance:
          type: number

    CarryoverRule:
      type: object
      properties:
        id:
          type: string
          format: uuid
        rule_name:
          type: string
        max_carryover_days:
          type: number
        expiry_months_after_year_end:
          type: integer
        expiry_action:
          type: string
          enum: [EXTENSION, CASHOUT, FORFEITURE]

    CarryoverRuleWrite:
      type: object
      required: [rule_name, max_carryover_days, expiry_months_after_year_end, expiry_action]
      properties:
        rule_name:
          type: string
        max_carryover_days:
          type: number
        expiry_months_after_year_end:
          type: integer
        expiry_action:
          type: string
          enum: [EXTENSION, CASHOUT, FORFEITURE]

    LeaveInstant:
      type: object
      properties:
        id:
          type: string
          format: uuid
        employee_id:
          type: string
          format: uuid
        leave_type_id:
          type: string
          format: uuid
        leave_policy_id:
          type: string
          format: uuid
        earned:
          type: number
        used:
          type: number
        reserved:
          type: number
        available:
          type: number
          description: "Computed: earned - used - reserved"
        expiring_soon:
          type: number
        computed_at:
          type: string
          format: date-time

    LeaveMovement:
      type: object
      description: Immutable ledger record — ADR-TA-001
      properties:
        id:
          type: string
          format: uuid
        employee_id:
          type: string
          format: uuid
        leave_type_id:
          type: string
          format: uuid
        movement_type:
          type: string
          enum: [EARN, USE, RESERVE, RELEASE, EXPIRE, ADJUST, CASHOUT]
        amount:
          type: number
          description: Positive = credit; negative = debit
        effective_date:
          type: string
          format: date
        expiry_date:
          type: string
          format: date
        reference_id:
          type: string
          format: uuid
        reference_type:
          type: string
        created_at:
          type: string
          format: date-time
        created_by:
          type: string

    LeaveMovementWrite:
      type: object
      required: [employee_id, leave_type_id, amount, effective_date, reason]
      description: Only ADJUST movements permitted via API
      properties:
        employee_id:
          type: string
          format: uuid
        leave_type_id:
          type: string
          format: uuid
        amount:
          type: number
          description: "Positive = credit adjustment; negative = debit adjustment. Must not be 0."
          not:
            enum: [0]
        effective_date:
          type: string
          format: date
        reason:
          type: string
          minLength: 10
          description: Required for ADJUST movements

    LeaveMovementListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/LeaveMovement'
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer

    AccrualBatchRun:
      type: object
      properties:
        id:
          type: string
          format: uuid
        accrual_plan_id:
          type: string
          format: uuid
        accrual_period_start:
          type: string
          format: date
        accrual_period_end:
          type: string
          format: date
        status:
          type: string
          enum: [RUNNING, COMPLETED, FAILED, SKIPPED]
        employee_count:
          type: integer
        movements_created:
          type: integer
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        failed_at:
          type: string
          format: date-time
        failure_reason:
          type: string

    # ── ta.attendance schemas ──────────────────────────────────────────────────

    Shift:
      type: object
      properties:
        id:
          type: string
          format: uuid
        shift_code:
          type: string
        shift_name:
          type: string
        start_time:
          type: string
          example: "08:00"
        end_time:
          type: string
          example: "17:00"
        break_duration_minutes:
          type: integer
        is_overnight:
          type: boolean
        grace_period_minutes:
          type: integer
        active:
          type: boolean

    ShiftWrite:
      type: object
      required: [shift_code, shift_name, start_time, end_time]
      properties:
        shift_code:
          type: string
        shift_name:
          type: string
        start_time:
          type: string
          pattern: '^([01]\d|2[0-3]):[0-5]\d$'
        end_time:
          type: string
          pattern: '^([01]\d|2[0-3]):[0-5]\d$'
        break_duration_minutes:
          type: integer
          default: 60
        is_overnight:
          type: boolean
          default: false
        grace_period_minutes:
          type: integer
          default: 15

    ShiftAssignment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        employee_id:
          type: string
          format: uuid
        shift_id:
          type: string
          format: uuid
        effective_from:
          type: string
          format: date
        effective_to:
          type: string
          format: date
        assigned_by:
          type: string
          format: uuid
        assigned_at:
          type: string
          format: date-time
        notes:
          type: string

    ShiftAssignmentWrite:
      type: object
      required: [employee_id, shift_id, effective_from]
      properties:
        employee_id:
          type: string
          format: uuid
        shift_id:
          type: string
          format: uuid
        effective_from:
          type: string
          format: date
        effective_to:
          type: string
          format: date
        notes:
          type: string

    WorkedPeriod:
      type: object
      properties:
        id:
          type: string
          format: uuid
        employee_id:
          type: string
          format: uuid
        work_date:
          type: string
          format: date
        gross_hours:
          type: number
        break_hours:
          type: number
        net_hours_worked:
          type: number
        ot_hours:
          type: number
        status:
          type: string
          enum: [PROVISIONAL, CONFIRMED, CORRECTED, EXCLUDED]
        punch_in_id:
          type: string
          format: uuid
        punch_out_id:
          type: string
          format: uuid

    CompTimeBalance:
      type: object
      properties:
        id:
          type: string
          format: uuid
        employee_id:
          type: string
          format: uuid
        earned_hours:
          type: number
        used_hours:
          type: number
        available_hours:
          type: number
        expiry_date:
          type: string
          format: date
        expiry_action:
          type: string
          enum: [EXTENSION, CASHOUT, FORFEITURE]
        expiry_warning_sent:
          type: boolean
        last_updated_at:
          type: string
          format: date-time

    # ── ta.shared schemas ──────────────────────────────────────────────────────

    Period:
      type: object
      properties:
        id:
          type: string
          format: uuid
        period_name:
          type: string
        period_type:
          type: string
          enum: [MONTHLY, CUSTOM]
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        status:
          type: string
          enum: [OPEN, LOCKED, CLOSED]
        holiday_calendar_id:
          type: string
          format: uuid
        working_days:
          type: integer
        locked_at:
          type: string
          format: date-time
        closed_at:
          type: string
          format: date-time

    PeriodWrite:
      type: object
      required: [period_name, start_date, end_date, holiday_calendar_id]
      properties:
        period_name:
          type: string
        period_type:
          type: string
          enum: [MONTHLY, CUSTOM]
          default: MONTHLY
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        holiday_calendar_id:
          type: string
          format: uuid

    HolidayCalendar:
      type: object
      properties:
        id:
          type: string
          format: uuid
        calendar_name:
          type: string
        country_code:
          type: string
        year:
          type: integer
        active:
          type: boolean
        holidays:
          type: array
          items:
            $ref: '#/components/schemas/Holiday'

    HolidayCalendarWrite:
      type: object
      required: [calendar_name, country_code, year, holidays]
      properties:
        calendar_name:
          type: string
        country_code:
          type: string
          default: "VN"
        year:
          type: integer
        holidays:
          type: array
          items:
            $ref: '#/components/schemas/HolidayWrite'

    Holiday:
      type: object
      properties:
        holiday_date:
          type: string
          format: date
        name_vn:
          type: string
        name_en:
          type: string
        is_compensated:
          type: boolean
        compensated_date:
          type: string
          format: date

    HolidayWrite:
      type: object
      required: [holiday_date, name_en]
      properties:
        holiday_date:
          type: string
          format: date
        name_vn:
          type: string
        name_en:
          type: string
        is_compensated:
          type: boolean
          default: false
        compensated_date:
          type: string
          format: date

    ApprovalChain:
      type: object
      properties:
        id:
          type: string
          format: uuid
        chain_name:
          type: string
        entity_type:
          type: string
          enum: [LEAVE_REQUEST, OT_REQUEST, TIMESHEET]
        routing_mode:
          type: string
          enum: [SKIP_LEVEL, CUSTOM]
        escalation_timeout_hours:
          type: integer
        escalation_target_role:
          type: string
        active:
          type: boolean
        steps:
          type: array
          items:
            $ref: '#/components/schemas/ApprovalStep'

    ApprovalChainWrite:
      type: object
      required: [chain_name, entity_type, routing_mode, escalation_timeout_hours, steps]
      properties:
        chain_name:
          type: string
        entity_type:
          type: string
          enum: [LEAVE_REQUEST, OT_REQUEST, TIMESHEET]
        routing_mode:
          type: string
          enum: [SKIP_LEVEL, CUSTOM]
        escalation_timeout_hours:
          type: integer
          default: 48
        escalation_target_role:
          type: string
        steps:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/ApprovalStepWrite'

    ApprovalStep:
      type: object
      properties:
        step_order:
          type: integer
        step_name:
          type: string
        approver_role:
          type: string
          enum: [DIRECT_MANAGER, SKIP_LEVEL_MANAGER, HR_ADMIN, CUSTOM]
        approver_employee_id:
          type: string
          format: uuid
        is_optional:
          type: boolean

    ApprovalStepWrite:
      type: object
      required: [step_order, approver_role]
      properties:
        step_order:
          type: integer
        step_name:
          type: string
        approver_role:
          type: string
          enum: [DIRECT_MANAGER, SKIP_LEVEL_MANAGER, HR_ADMIN, CUSTOM]
        approver_employee_id:
          type: string
          format: uuid
          description: Required when approver_role = CUSTOM
        is_optional:
          type: boolean
          default: false

    TenantConfig:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        default_holiday_calendar_id:
          type: string
          format: uuid
        default_ot_approval_routing_mode:
          type: string
          enum: [SKIP_LEVEL, CUSTOM]
        cancellation_deadline_days:
          type: integer
          description: H-P0-001
        comp_time_expiry_warning_days:
          type: integer
          description: H-P0-002
        default_comp_time_action:
          type: string
          enum: [EXTENSION, CASHOUT, FORFEITURE]
          description: H-P0-002
        termination_balance_default_action:
          type: string
          enum: [AUTO_DEDUCT, HR_REVIEW, WRITE_OFF, RULE_BASED]
          description: H-P0-004
        termination_writeoff_threshold_days:
          type: number
        payroll_export_format:
          type: string
          enum: [JSON, CSV, XML]
        data_region:
          type: string
          description: H10 - immutable after tenant onboarding
        updated_at:
          type: string
          format: date-time

    TenantConfigWrite:
      type: object
      properties:
        default_holiday_calendar_id:
          type: string
          format: uuid
        default_ot_approval_routing_mode:
          type: string
          enum: [SKIP_LEVEL, CUSTOM]
        cancellation_deadline_days:
          type: integer
          minimum: 0
        comp_time_expiry_warning_days:
          type: integer
          minimum: 1
        default_comp_time_action:
          type: string
          enum: [EXTENSION, CASHOUT, FORFEITURE]
        termination_balance_default_action:
          type: string
          enum: [AUTO_DEDUCT, HR_REVIEW, WRITE_OFF, RULE_BASED]
        termination_writeoff_threshold_days:
          type: number
        payroll_export_format:
          type: string
          enum: [JSON, CSV, XML]

    PayrollExportPackage:
      type: object
      description: Immutable export artifact — ADR-TA-001
      properties:
        id:
          type: string
          format: uuid
        period_id:
          type: string
          format: uuid
        generated_at:
          type: string
          format: date-time
        generated_by:
          type: string
        employee_count:
          type: integer
        total_regular_hours:
          type: number
        total_ot_hours:
          type: number
        total_leave_days:
          type: number
        total_comp_time_hours:
          type: number
        termination_records_count:
          type: integer
        termination_balance_action:
          type: string
          enum: [AUTO_DEDUCT, HR_REVIEW, WRITE_OFF, RULE_BASED]
        export_format:
          type: string
        checksum:
          type: string
          description: SHA-256 of export payload
        dispatched_at:
          type: string
          format: date-time
        dispatch_status:
          type: string
          enum: [PENDING, DISPATCHED, ACKNOWLEDGED, FAILED]
        payroll_system_ref:
          type: string
