              $ref: '#/components/schemas/AccrualPlanWrite'
      responses:
        '200':
          description: Accrual plan updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccrualPlan'

  # ─────────────────────────────────────────────────────────────────────────────
  # ta.absence — Carryover Rules
  # ─────────────────────────────────────────────────────────────────────────────

  /carryover-rules:
    get:
      operationId: listCarryoverRules
      tags: [Carryover Rules]
      summary: List carryover rules
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Carryover rules
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/CarryoverRule'

    post:
      operationId: createCarryoverRule
      tags: [Carryover Rules]
      summary: Create a carryover rule
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CarryoverRuleWrite'
      responses:
        '201':
          description: Carryover rule created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CarryoverRule'

  /carryover-rules/{id}:
    get:
      operationId: getCarryoverRule
      tags: [Carryover Rules]
      summary: Get carryover rule by ID
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Carryover rule
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CarryoverRule'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      operationId: updateCarryoverRule
      tags: [Carryover Rules]
      summary: Update a carryover rule
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CarryoverRuleWrite'
      responses:
        '200':
          description: Carryover rule updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CarryoverRule'

  # ─────────────────────────────────────────────────────────────────────────────
  # ta.absence — Leave Instants (read-only)
  # ─────────────────────────────────────────────────────────────────────────────

  /leave-instants:
    get:
      operationId: listLeaveInstants
      tags: [Leave Instants]
      summary: List leave balance snapshots (read-only)
      description: |
        Returns computed LeaveInstant records (balance snapshots).
        Read-only — balances are computed from the LeaveMovement ledger.
        HR Admin can query by employee_id. Employees see own balances only.
      security:
        - BearerAuth: []
      parameters:
        - name: employee_id
          in: query
          schema:
            type: string
            format: uuid
        - name: leave_type_id
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Leave balance snapshots
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/LeaveInstant'

  /leave-instants/{id}:
    get:
      operationId: getLeaveInstant
      tags: [Leave Instants]
      summary: Get a specific leave balance snapshot
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Leave instant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaveInstant'
        '404':
          $ref: '#/components/responses/NotFound'

  # ─────────────────────────────────────────────────────────────────────────────
  # ta.absence — Leave Movements (append-only)
  # ─────────────────────────────────────────────────────────────────────────────

  /leave-movements:
    get:
      operationId: listLeaveMovements
      tags: [Leave Movements]
      summary: List leave movement ledger entries
      description: |
        Returns the immutable leave movement ledger (ADR-TA-001).
        Append-only: GET and POST only; no PUT or DELETE.
      security:
        - BearerAuth: []
      parameters:
        - name: employee_id
          in: query
          schema:
            type: string
            format: uuid
        - name: leave_type_id
          in: query
          schema:
            type: string
            format: uuid
        - name: movement_type
          in: query
          schema:
            type: string
            enum: [EARN, USE, RESERVE, RELEASE, EXPIRE, ADJUST, CASHOUT]
        - name: effective_date_from
          in: query
          schema:
            type: string
            format: date
        - name: effective_date_to
          in: query
          schema:
            type: string
            format: date
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: Leave movements (ledger view)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaveMovementListResponse'

    post:
      operationId: createLeaveMovement
      tags: [Leave Movements]
      summary: Create a manual leave movement (HR ADJUST only)
      description: |
        HR Admin creates a manual ADJUST movement. Only ADJUST movement_type is
        permitted via this endpoint. All other movement types are system-generated.
        ADR-TA-001: Append-only; no UPDATE or DELETE.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LeaveMovementWrite'
      responses:
        '201':
          description: Manual adjustment movement created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaveMovement'
        '422':
          description: Only ADJUST movements permitted via this endpoint
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /leave-movements/{id}:
    get:
      operationId: getLeaveMovement
      tags: [Leave Movements]
      summary: Get a specific leave movement
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Leave movement
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaveMovement'
        '404':
          $ref: '#/components/responses/NotFound'

  # ─────────────────────────────────────────────────────────────────────────────
  # ta.absence — Accrual Batch Runs
  # ─────────────────────────────────────────────────────────────────────────────

  /accrual-batch-runs:
    get:
      operationId: listAccrualBatchRuns
      tags: [Accrual Batch Runs]
      summary: List accrual batch run records
      security:
        - BearerAuth: []
      parameters:
        - name: accrual_plan_id
          in: query
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            type: string
            enum: [RUNNING, COMPLETED, FAILED, SKIPPED]
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: Accrual batch runs
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/AccrualBatchRun'

    post:
      operationId: triggerAccrualBatch
      tags: [Accrual Batch Runs]
      summary: Trigger an accrual batch run
      description: |
        HR Admin triggers manual accrual batch. Idempotent: if a COMPLETED run
        already exists for the same plan + period, returns existing run.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [accrual_plan_id, accrual_period_start, accrual_period_end]
              properties:
                accrual_plan_id:
                  type: string
                  format: uuid
                accrual_period_start:
                  type: string
                  format: date
                accrual_period_end:
                  type: string
                  format: date
      responses:
        '201':
          description: Accrual batch triggered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccrualBatchRun'

  /accrual-batch-runs/{id}:
    get:
      operationId: getAccrualBatchRun
      tags: [Accrual Batch Runs]
      summary: Get accrual batch run status
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Accrual batch run
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccrualBatchRun'
        '404':
          $ref: '#/components/responses/NotFound'

  # ─────────────────────────────────────────────────────────────────────────────
  # ta.attendance — Shifts
  # ─────────────────────────────────────────────────────────────────────────────

  /shifts:
    get:
      operationId: listShifts
      tags: [Shifts]
      summary: List all shifts
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ActiveFilter'
      responses:
        '200':
          description: Shifts list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Shift'

    post:
      operationId: createShift
      tags: [Shifts]
      summary: Create a shift template
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShiftWrite'
      responses:
        '201':
          description: Shift created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shift'

  /shifts/{id}:
    get:
      operationId: getShift
      tags: [Shifts]
      summary: Get shift by ID
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Shift
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shift'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      operationId: updateShift
      tags: [Shifts]
      summary: Update a shift template
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShiftWrite'
      responses:
        '200':
          description: Shift updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shift'

    delete:
      operationId: deactivateShift
      tags: [Shifts]
      summary: Deactivate a shift (soft delete)
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Shift deactivated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shift'

  # ─────────────────────────────────────────────────────────────────────────────
  # ta.attendance — Shift Assignments
  # ─────────────────────────────────────────────────────────────────────────────

  /shift-assignments:
    get:
      operationId: listShiftAssignments
      tags: [Shift Assignments]
      summary: List shift assignments
      security:
        - BearerAuth: []
      parameters:
        - name: employee_id
          in: query
          schema:
            type: string
            format: uuid
        - name: shift_id
          in: query
          schema:
            type: string
            format: uuid
        - name: effective_date
          in: query
          schema:
            type: string
            format: date
          description: Returns assignments active on this date
      responses:
        '200':
          description: Shift assignments
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/ShiftAssignment'

    post:
      operationId: createShiftAssignment
      tags: [Shift Assignments]
      summary: Assign a shift to an employee
      description: |
        Creates a new shift assignment. Validates:
        - No overlapping active assignment for the same employee
        - VLC Art. 109: minimum 8h rest period between shifts enforced
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShiftAssignmentWrite'
      responses:
