      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccrualPlanWrite'
      responses:
        '201':
          description: Accrual plan created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccrualPlan'

  /accrual-plans/{id}:
    get:
      operationId: getAccrualPlan
      tags: [Accrual Plans]
      summary: Get accrual plan by ID
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Accrual plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccrualPlan'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      operationId: updateAccrualPlan
      tags: [Accrual Plans]
      summary: Update an accrual plan
      security:
