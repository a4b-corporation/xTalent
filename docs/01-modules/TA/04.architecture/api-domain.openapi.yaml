openapi: 3.0.3
info:
  title: xTalent Time & Absence — Domain (CRUD) API
  description: |
    Standard CRUD API for all aggregate roots across the three bounded contexts.
    Naming convention: /api/v1/{resource} (plural, kebab-case).

    This API is distinct from api-usecase.openapi.yaml:
    - Domain API: resource-centric CRUD for configuration and data access
    - Use-Case API: business-intent endpoints derived from flows

    **Aggregate Roots Covered:**
    - ta.absence: leave-types, leave-policies, leave-classes, accrual-plans, carryover-rules,
                  leave-instants (read-only), leave-movements (append-only), accrual-batch-runs
    - ta.attendance: shifts, shift-assignments, worked-periods, comp-time-balances
    - ta.shared: periods, holiday-calendars, approval-chains, tenant-configs, payroll-exports

    **Authentication:** Bearer JWT
    **Multi-tenancy:** tenant_id injected from JWT claim on all writes; filtered on all reads
  version: "1.0.0"
  contact:
    name: xTalent Platform Team

servers:
  - url: https://api.xtalent.io/api/v1
    description: Production

tags:
  - name: Leave Types
    description: Leave type configuration (ta.absence)
  - name: Leave Policies
    description: Leave policy management (ta.absence)
  - name: Leave Classes
    description: Leave class groupings for deduction priority (ta.absence)
  - name: Accrual Plans
    description: Accrual plan configuration (ta.absence)
  - name: Carryover Rules
    description: Year-end carryover configuration (ta.absence)
  - name: Leave Instants
    description: Read-only balance snapshots (ta.absence)
  - name: Leave Movements
    description: Append-only balance ledger (ta.absence)
  - name: Accrual Batch Runs
    description: Accrual batch execution records (ta.absence)
  - name: Shifts
    description: Shift template management (ta.attendance)
  - name: Shift Assignments
    description: Employee shift assignments (ta.attendance)
  - name: Worked Periods
    description: Computed worked time records (ta.attendance)
  - name: Comp Time Balances
    description: Compensatory time balance management (ta.attendance)
  - name: Periods
    description: Payroll period management (ta.shared)
  - name: Holiday Calendars
    description: Holiday calendar CRUD (ta.shared)
  - name: Approval Chains
    description: Approval workflow configuration (ta.shared)
  - name: Tenant Config
    description: Tenant-level policy configuration (ta.shared)
  - name: Payroll Exports
    description: Payroll export package retrieval (ta.shared)

paths:

  # ─────────────────────────────────────────────────────────────────────────────
  # ta.absence — Leave Types
  # ─────────────────────────────────────────────────────────────────────────────

  /leave-types:
    get:
      operationId: listLeaveTypes
      tags: [Leave Types]
      summary: List all leave types for the tenant
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ActiveFilter'
        - $ref: '#/components/parameters/CountryCodeFilter'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: Paginated list of leave types
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaveTypeListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      operationId: createLeaveType
      tags: [Leave Types]
      summary: Create a new leave type
      description: |
        HR Admin creates a new leave type. VLC Art. 113: Annual leave entitlement
        cannot be set below 14 days. code must be unique per tenant.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LeaveTypeWrite'
      responses:
        '201':
          description: Leave type created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaveType'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: Conflict — code already exists for this tenant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /leave-types/{id}:
    get:
      operationId: getLeaveType
      tags: [Leave Types]
      summary: Get leave type by ID
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Leave type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaveType'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      operationId: updateLeaveType
      tags: [Leave Types]
      summary: Update a leave type
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LeaveTypeWrite'
      responses:
        '200':
          description: Leave type updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaveType'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      operationId: deactivateLeaveType
      tags: [Leave Types]
      summary: Deactivate a leave type (soft delete)
      description: Sets active = false. Warns if employees have active balances.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Leave type deactivated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaveType'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ─────────────────────────────────────────────────────────────────────────────
  # ta.absence — Leave Policies
  # ─────────────────────────────────────────────────────────────────────────────

  /leave-policies:
    get:
      operationId: listLeavePolicies
      tags: [Leave Policies]
      summary: List leave policies
      security:
        - BearerAuth: []
      parameters:
        - name: leave_type_id
          in: query
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/ActiveFilter'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: List of leave policies
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeavePolicyListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      operationId: createLeavePolicy
      tags: [Leave Policies]
      summary: Create a leave policy
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LeavePolicyWrite'
      responses:
        '201':
          description: Leave policy created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeavePolicy'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /leave-policies/{id}:
    get:
      operationId: getLeavePolicy
      tags: [Leave Policies]
      summary: Get leave policy by ID
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Leave policy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeavePolicy'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      operationId: updateLeavePolicy
      tags: [Leave Policies]
      summary: Update a leave policy
      description: Policy changes are not retroactive — affects new requests only.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LeavePolicyWrite'
      responses:
        '200':
          description: Leave policy updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeavePolicy'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

