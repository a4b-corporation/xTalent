      responses:
        '200':
          description: Accrual plans
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/AccrualPlan'

    post:
      operationId: createAccrualPlan
