      responses:
        '201':
          description: Element assignment added

  /pay-profiles/{id}/element-assignments/{assignmentId}:
    delete:
      tags:
        - Pay Profiles (CRUD)
      summary: Remove element assignment
      operationId: removeElementAssignment
      parameters:
        - name: id
          in: path
