          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Element assignments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PayElementAssignmentResponse'

    post:
      tags:
        - Pay Profiles (CRUD)
      summary: Add element assignment to profile
      operationId: addElementAssignment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
