    put:
      tags:
        - GL Mapping Policies (CRUD)
      summary: Update policy
      operationId: updateGLMappingPolicyCrud
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
