    PayElementResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        elementCode:
          type: string
        elementName:
          type: string
        legalEntityId:
          type: string
        classification:
          type: string
          enum: [EARNING, DEDUCTION, TAX, EMPLOYER_CONTRIBUTION]
        calculationType:
          type: string
          enum: [FIXED, FORMULA, RATE_BASED, HOURS_BASED]
        statutoryFlag:
          type: boolean
        taxableFlag:
          type: boolean
        formulaId:
          type: string
        rate:
          type: number
        amount:
          type: number
        isActive:
          type: boolean
        effectiveStartDate:
          type: string
          format: date
        effectiveEndDate:
          type: string
          format: date
          nullable: true
        isCurrentFlag:
          type: boolean
        versionReason:
          type: string
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time

    PayProfileResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        profileCode:
          type: string
        profileName:
          type: string
        legalEntityId:
          type: string
        payFrequencyId:
          type: string
        description:
          type: string
        isActive:
          type: boolean
        effectiveStartDate:
          type: string
          format: date
        effectiveEndDate:
          type: string
          format: date
          nullable: true
        isCurrentFlag:
          type: boolean
        elementAssignments:
          type: array
          items:
            $ref: '#/components/schemas/PayElementAssignmentResponse'
        statutoryRuleAssignments:
          type: array
          items:
            $ref: '#/components/schemas/StatutoryRuleAssignmentResponse'
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time

    PayElementAssignmentResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        payElementId:
          type: string
        payElementName:
          type: string
        priority:
          type: integer
        formulaOverride:
          type: string
        rateOverride:
          type: number
        amountOverride:
          type: number
        effectiveStartDate:
          type: string
          format: date
        effectiveEndDate:
          type: string
          format: date

    StatutoryRuleAssignmentResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        statutoryRuleId:
          type: string
        statutoryRuleName:
          type: string
        effectiveStartDate:
          type: string
          format: date
        effectiveEndDate:
          type: string
          format: date

    PayFormulaResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        formulaId:
          type: string
        formulaName:
          type: string
        expression:
          type: string
        description:
          type: string
        isActive:
          type: boolean
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time

    StatutoryRuleResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        ruleCode:
          type: string
        ruleName:
          type: string
        statutoryType:
          type: string
          enum: [BHXH, BHYT, BHTN, PIT]
