          type: string
        versionId:
          type: string
        sessionId:
          type: string
        ipAddress:
          type: string
        notes:
          type: string

    # ============================================
    # CREATE REQUESTS
    # ============================================
    PayElementCreateRequest:
      type: object
      required:
        - elementCode
        - elementName
        - legalEntityId
        - classification
        - calculationType
        - statutoryFlag
        - taxableFlag
        - effectiveStartDate
      properties:
        elementCode:
          type: string
          maxLength: 50
        elementName:
          type: string
          maxLength: 100
        legalEntityId:
          type: string
        classification:
          type: string
          enum: [EARNING, DEDUCTION, TAX, EMPLOYER_CONTRIBUTION]
        calculationType:
          type: string
          enum: [FIXED, FORMULA, RATE_BASED, HOURS_BASED]
        statutoryFlag:
          type: boolean
        taxableFlag:
          type: boolean
        formulaId:
          type: string
        rate:
          type: number
        amount:
          type: number
        effectiveStartDate:
          type: string
          format: date

    PayElementUpdateRequest:
      type: object
      required:
        - effectiveStartDate
        - versionReason
      properties:
        elementName:
          type: string
        formulaId:
          type: string
        rate:
          type: number
        amount:
          type: number
        taxableFlag:
          type: boolean
        effectiveStartDate:
          type: string
          format: date
        versionReason:
          type: string
          maxLength: 500

    PayProfileCreateRequest:
      type: object
      required:
        - profileCode
        - profileName
        - legalEntityId
        - payFrequencyId
      properties:
        profileCode:
          type: string
          maxLength: 50
        profileName:
          type: string
          maxLength: 100
        legalEntityId:
          type: string
        payFrequencyId:
          type: string
        description:
          type: string
          maxLength: 500
        effectiveStartDate:
          type: string
          format: date

    PayProfileUpdateRequest:
      type: object
      required:
        - effectiveStartDate
        - versionReason
      properties:
        profileName:
          type: string
        payFrequencyId:
          type: string
        description:
          type: string
        effectiveStartDate:
          type: string
          format: date
        versionReason:
          type: string
          maxLength: 500

    PayElementAssignmentCreateRequest:
      type: object
      required:
        - payElementId
        - priority
        - effectiveStartDate
      properties:
        payElementId:
          type: string
        priority:
          type: integer
          minimum: 1
          maximum: 99
        formulaOverride:
          type: string
          maxLength: 1000
        rateOverride:
          type: number
        amountOverride:
          type: number
        effectiveStartDate:
          type: string
          format: date

    PayFormulaCreateRequest:
      type: object
      required:
        - formulaId
        - formulaName
