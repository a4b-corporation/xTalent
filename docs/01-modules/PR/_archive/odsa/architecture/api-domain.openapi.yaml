      type: object
      properties:
        formulaName:
          type: string
        expression:
          type: string
          maxLength: 1000
        description:
          type: string
        isActive:
          type: boolean

    StatutoryRuleCreateRequest:
      type: object
      required:
        - ruleCode
        - ruleName
        - statutoryType
        - partyType
        - rateType
