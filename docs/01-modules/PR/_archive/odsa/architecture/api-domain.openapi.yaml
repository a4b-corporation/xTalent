    PayProfileListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/PayProfileResponse'
        pagination:
          $ref: '#/components/schemas/PaginationResponse'

    PayFormulaListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/PayFormulaResponse'

    StatutoryRuleListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/StatutoryRuleResponse'

    PayCalendarListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/PayCalendarResponse'

    PayGroupListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/PayGroupResponse'

    GLMappingPolicyListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/GLMappingPolicyResponse'

    BankTemplateListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/BankTemplateResponse'

    ValidationRuleListResponse:
