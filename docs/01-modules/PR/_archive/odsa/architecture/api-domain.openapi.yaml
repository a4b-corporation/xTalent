        data:
          type: array
          items:
            $ref: '#/components/schemas/ValidationRuleResponse'

    AuditLogListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AuditLogResponse'

    PaginationResponse:
      type: object
      properties:
        page:
