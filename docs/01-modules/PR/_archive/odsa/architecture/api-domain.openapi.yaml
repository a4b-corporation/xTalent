openapi: 3.0.3
info:
  title: Payroll API - Domain Driven
  description: |
    Domain-driven CRUD API for the Payroll Configuration module.
    These endpoints provide standard CRUD operations per aggregate root.

    **Naming Convention**: Standard REST CRUD naming (GET, POST, PUT, DELETE)

    **Aggregate Roots**:
    - PayElement (SCD-2 versioned)
    - PayProfile (SCD-2 versioned)
    - PayFormula
    - StatutoryRule (SCD-2 versioned)
    - PayCalendar
    - PayGroup
    - GLMappingPolicy
    - BankTemplate
    - ValidationRule
    - AuditLog

    **SCD-2 Operations**: Versioning endpoints separate from CRUD
  version: 1.0.0
  contact:
    name: xTalent API Support
    email: api-support@xtalent.example.com

servers:
  - url: https://api.xtalent.example.com/v1/pr
    description: Production server
  - url: https://api-staging.xtalent.example.com/v1/pr
    description: Staging server

tags:
  - name: Pay Elements (CRUD)
    description: CRUD operations for PayElement aggregate
  - name: Pay Profiles (CRUD)
    description: CRUD operations for PayProfile aggregate
  - name: Pay Formulas (CRUD)
    description: CRUD operations for PayFormula aggregate
  - name: Statutory Rules (CRUD)
    description: CRUD operations for StatutoryRule aggregate
  - name: Pay Calendars (CRUD)
    description: CRUD operations for PayCalendar aggregate
  - name: Pay Groups (CRUD)
    description: CRUD operations for PayGroup aggregate
  - name: GL Mapping Policies (CRUD)
    description: CRUD operations for GLMappingPolicy aggregate
  - name: Bank Templates (CRUD)
    description: CRUD operations for BankTemplate aggregate
  - name: Validation Rules (CRUD)
    description: CRUD operations for ValidationRule aggregate
  - name: Audit Logs (CRUD)
    description: CRUD operations for AuditLog aggregate

paths:
  # ============================================
  # PAY ELEMENT CRUD
  # ============================================
  /pay-elements:
    get:
      tags:
        - Pay Elements (CRUD)
      summary: List pay elements
      description: Returns list of pay elements with filtering
      operationId: listPayElements
      parameters:
        - name: legalEntityId
          in: query
          required: false
          schema:
            type: string
        - name: classification
          in: query
          required: false
          schema:
            type: string
            enum: [EARNING, DEDUCTION, TAX, EMPLOYER_CONTRIBUTION]
        - name: isCurrent
          in: query
          required: false
          schema:
            type: boolean
            default: true
        - name: isActive
          in: query
          required: false
          schema:
            type: boolean
            default: true
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: List of pay elements
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PayElementListResponse'

    post:
      tags:
        - Pay Elements (CRUD)
      summary: Create pay element
      description: Creates a new pay element (version 1)
      operationId: createPayElementCrud
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PayElementCreateRequest'
      responses:
        '201':
          description: Pay element created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PayElementResponse'

  /pay-elements/{id}:
    get:
      tags:
        - Pay Elements (CRUD)
      summary: Get pay element by ID
      description: Returns pay element by UUID
      operationId: getPayElementById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Pay element details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PayElementResponse'
        '404':
          description: Pay element not found

    put:
      tags:
        - Pay Elements (CRUD)
      summary: Update pay element (creates new version)
      description: Updates pay element and creates new SCD-2 version
      operationId: updatePayElementCrud
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PayElementUpdateRequest'
      responses:
        '200':
          description: Pay element updated (new version created)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PayElementResponse'

    delete:
      tags:
        - Pay Elements (CRUD)
      summary: Soft delete pay element
      description: Marks pay element as inactive (soft delete)
      operationId: deletePayElementCrud
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Pay element soft-deleted
        '409':
          description: Element in use, cannot delete

  /pay-elements/by-code/{elementCode}:
    get:
      tags:
        - Pay Elements (CRUD)
      summary: Get pay element by code
      description: Returns current version of pay element by business key
      operationId: getPayElementByCode
      parameters:
        - name: elementCode
          in: path
          required: true
          schema:
            type: string
        - name: legalEntityId
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Pay element details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PayElementResponse'

