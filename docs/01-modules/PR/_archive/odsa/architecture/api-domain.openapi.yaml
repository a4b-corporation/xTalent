          type: string
          enum: [EMPLOYEE, EMPLOYER]
        rateType:
          type: string
          enum: [FIXED_RATE, PROGRESSIVE, LOOKUP_BASED]
        rate:
          type: number
        ceilingAmount:
          type: number
        floorAmount:
          type: number
        personalExemption:
          type: number
        dependentExemption:
          type: number
        isActive:
          type: boolean
        effectiveStartDate:
          type: string
          format: date
        effectiveEndDate:
          type: string
          format: date
          nullable: true
        isCurrentFlag:
          type: boolean
        taxBrackets:
          type: array
          items:
            $ref: '#/components/schemas/TaxBracketResponse'
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time

    TaxBracketResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        bracketNumber:
          type: integer
        minAmount:
          type: number
        maxAmount:
          type: number
          nullable: true
        rate:
          type: number
        taxAmount:
          type: number

    PayCalendarResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        calendarCode:
          type: string
        calendarName:
          type: string
        legalEntityId:
          type: string
        payFrequencyId:
          type: string
        fiscalYear:
          type: integer
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        isActive:
          type: boolean
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time

    PayPeriodResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        periodId:
          type: string
        periodNumber:
          type: integer
        periodName:
          type: string
        periodStartDate:
          type: string
          format: date
        periodEndDate:
          type: string
          format: date
        cutOffDate:
          type: string
          format: date
        payDate:
          type: string
          format: date
        status:
          type: string
          enum: [OPEN, CLOSED, PAID, REOPENED]
        adjustmentReason:
          type: string

    PayGroupResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        groupCode:
          type: string
        groupName:
          type: string
        payProfileId:
          type: string
        payCalendarId:
          type: string
        description:
          type: string
        isActive:
          type: boolean
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time

    PayGroupAssignmentResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        assignmentId:
          type: string
        employeeId:
          type: string
        assignmentDate:
          type: string
          format: date
        removalDate:
          type: string
          format: date
          nullable: true
        assignmentReason:
          type: string
          enum: [NEW_HIRE, TRANSFER, PROMOTION, REORGANIZATION, PROFILE_CHANGE, OTHER]
        removalReason:
          type: string
          enum: [TRANSFER, TERMINATION, PROMOTION, REORGANIZATION, OTHER]
        isCurrent:
          type: boolean

    GLMappingPolicyResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        policyCode:
          type: string
        policyName:
          type: string
        payElementId:
          type: string
        description:
          type: string
        isActive:
          type: boolean
        mappings:
          type: array
          items:
            $ref: '#/components/schemas/GLMappingResponse'
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time

    GLMappingResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        mappingId:
          type: string
        glAccountCode:
          type: string
        glAccountName:
          type: string
        costCenter:
          type: string
        debitCredit:
          type: string
          enum: [DEBIT, CREDIT]
        percentage:
          type: number
        description:
          type: string
        effectiveStartDate:
          type: string
          format: date
        effectiveEndDate:
          type: string
          format: date

    BankTemplateResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        templateCode:
          type: string
        templateName:
          type: string
        bankCode:
          type: string
        bankName:
          type: string
        fileFormat:
          type: string
          enum: [CSV, FIXED, XML, JSON]
        delimiter:
          type: string
        encoding:
          type: string
        headerRows:
          type: integer
        footerRows:
          type: integer
        isActive:
          type: boolean
        fieldMappings:
          type: array
          items:
            $ref: '#/components/schemas/FieldMappingResponse'
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time

    FieldMappingResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        mappingId:
          type: string
        sourceField:
          type: string
        targetField:
          type: string
        position:
          type: integer
        format:
          type: string
        length:
          type: integer
        padding:
          type: string
        defaultValue:
          type: string
        isRequired:
          type: boolean

    ValidationRuleResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        ruleCode:
          type: string
        ruleName:
          type: string
        validationType:
          type: string
          enum: [FIELD, CROSS_FIELD, ENTITY, CROSS_ENTITY, BUSINESS_RULE]
        targetEntity:
          type: string
        targetField:
          type: string
        severity:
          type: string
          enum: [ERROR, WARNING, INFO]
        messageTemplate:
          type: string
        isActive:
          type: boolean

    AuditLogResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        logId:
          type: string
        scopeType:
          type: string
          enum: [TENANT, LEGAL_ENTITY, MODULE]
        scopeId:
          type: string
        createdAt:
          type: string
          format: date-time

    AuditEntryResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        entryId:
          type: string
        entityType:
          type: string
          enum: [PayElement, PayProfile, PayFormula, StatutoryRule, PayCalendar, PayGroup, GLMappingPolicy, BankTemplate, PayElementAssignment, PayGroupAssignment]
        entityId:
          type: string
        entityName:
          type: string
        operation:
          type: string
          enum: [CREATE, UPDATE, DELETE, ASSIGN, UNASSIGN, VERSION_CREATE, VALIDATE, EXPORT]
        changedBy:
          type: string
        changedByName:
          type: string
        changedAt:
          type: string
          format: date-time
        oldValue:
          type: object
        newValue:
          type: object
        changedFields:
          type: array
          items:
            type: string
