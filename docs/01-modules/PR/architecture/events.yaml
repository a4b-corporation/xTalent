# Event Repository - Payroll Module (PR)
# Module: Payroll Configuration
# Version: 1.0
# Date: 2026-03-31
# Description: Centralized Business Event Repository aggregating all domain events
# Sources: Event Storming (Step 2), Use Case Flows (Step 3), BC Interactions (Step 4)

metadata:
  module: PR
  module_name: Payroll Configuration
  version: 1.0.0
  created: 2026-03-31
  event_count: 53
  categories:
    - configuration
    - validation
    - audit
    - integration_inbound
    - integration_outbound

# ============================================
# EVENT CATEGORIES
# ============================================

categories:
  configuration:
    description: Domain events for configuration entity lifecycle
    bounded_contexts:
      - payroll-configuration
      - statutory-compliance
      - payroll-calendar
      - payroll-assignment
      - finance-integration
    count: 32

  validation:
    description: Events for configuration validation and conflict detection
    bounded_contexts:
      - configuration-validation
    count: 6

  audit:
    description: Audit trail and compliance events
    bounded_contexts:
      - audit-trail
    count: 3

  integration_inbound:
    description: Events received from upstream modules (CO, TA, TR)
    bounded_contexts:
      - payroll-configuration
      - payroll-assignment
    count: 9

  integration_outbound:
    description: Events sent to downstream systems (CalcEngine, Finance, Banking)
    bounded_contexts:
      - payroll-configuration
      - finance-integration
    count: 3

