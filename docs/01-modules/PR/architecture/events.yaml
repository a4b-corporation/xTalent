  ConfigurationSnapshotGenerated:
    id: E051
    category: integration_outbound
    bounded_context: payroll-configuration
    aggregate: PayProfile
    description: Configuration snapshot for calculation engine
    producer: Payroll Configuration BC
    consumers:
      - Calculation Engine
    payload:
      snapshotId: string
      legalEntityId: string
      snapshotDate: date
      payElements: array
      payProfiles: array
      statutoryRules: array
      generatedAt: timestamp
    triggers:
      - GenerateSnapshot (Policy P013)
    versioning: false

  GLMappingExportRequested:
    id: E052
    category: integration_outbound
    bounded_context: finance-integration
    aggregate: GLMappingPolicy
    description: GL mapping export requested
    producer: Finance Integration BC
    consumers:
      - Finance System
    payload:
      exportId: string
      exportFormat: enum
      legalEntityId: string
      requestedBy: string
      requestedAt: timestamp
    triggers: []
    versioning: false

  BankTemplateExportRequested:
    id: E053
    category: integration_outbound
    bounded_context: finance-integration
    aggregate: BankTemplate
    description: Bank template export requested
    producer: Finance Integration BC
    consumers:
      - Banking System
    payload:
      exportId: string
      templateCode: string
      exportFormat: enum
      requestedBy: string
      requestedAt: timestamp
    triggers: []
    versioning: false

# ============================================
# EVENT RELATIONSHIPS
# ============================================

event_chains:
  PayElementLifecycle:
    description: Full lifecycle of a pay element from creation to deletion
    sequence:
      - PayElementCreated
      - PayElementUpdated (optional, triggers PayElementVersionCreated)
      - PayElementVersionCreated (if updated)
      - PayElementDeleted (optional)

  PayProfileConfiguration:
    description: Pay profile creation with element assignments
    sequence:
      - PayProfileCreated
      - PayElementAssigned (multiple)
      - PayProfileUpdated (optional)
      - PayProfileVersionCreated (if updated)

  EmployeePayrollAssignment:
    description: Employee assignment to pay group
    sequence:
      - WorkerDataReceived (from CO)
      - PayGroupCreated
      - EmployeeAssignedToGroup
      - EmployeeRemovedFromGroup (optional)

  ConfigurationValidation:
    description: Validation workflow for configuration changes
    sequence:
      - ConfigurationValidated (success)
      - OR ConfigurationValidationFailed (failure)
      - OR ConflictDetected (if conflict found)
      - ConflictResolved (manual resolution)

  FormulaValidation:
    description: Formula creation and validation workflow
    sequence:
      - FormulaCreated
      - FormulaValidated (success)
      - OR FormulaValidationFailed (failure)
      - OR CircularReferenceDetected (if circular ref)

# ============================================
# POLICY TRIGGERS
# ============================================

policies:
  P001_CreateAuditOnCreate:
    trigger: PayElementCreated, PayProfileCreated, StatutoryRuleCreated, etc.
    action: CreateAuditEntry
    target: Audit Trail BC

  P002_CreateAuditOnUpdate:
    trigger: PayElementUpdated, PayProfileUpdated, StatutoryRuleUpdated, etc.
    action: CreateAuditEntry
    target: Audit Trail BC

  P003_CreateVersionOnUpdate:
    trigger: PayElementUpdated, PayProfileUpdated, StatutoryRuleUpdated
    action: CreateNewVersion
    target: Payroll Configuration BC

  P004_ValidateOnAssignment:
    trigger: PayElementAssigned
    action: ValidateConfiguration
    target: Validation BC

  P005_ValidateElementActive:
    trigger: AssignPayElement (command)
    action: ValidateElementStatus
    target: Validation BC

  P006_CreateVersionOnStatutoryUpdate:
    trigger: StatutoryRuleUpdated
    action: CreateNewVersion
    target: Statutory Compliance BC

  P007_ValidateFormulaOnSave:
    trigger: FormulaCreated, FormulaUpdated
    action: ValidateFormula
    target: Validation BC

  P008_CheckCircularReference:
    trigger: FormulaCreated, FormulaUpdated
    action: DetectCircularRef
    target: Validation BC

  P009_GeneratePeriodsOnCalendarCreate:
    trigger: PayCalendarCreated
    action: GeneratePayPeriods
    target: Payroll Calendar BC

  P010_ValidateSingleEmployeeAssignment:
    trigger: AssignEmployeeToGroup (command)
    action: ValidateEmployeeAssignment
    target: Validation BC

  P011_NotifyOnConflictDetected:
    trigger: ConflictDetected, ConfigurationValidationFailed
    action: AlertAdmin
    target: Payroll Admin (UI notification)

  P012_ValidateIntegrationData:
    trigger: WorkerDataReceived
    action: ValidateReferences
    target: Validation BC

  P013_SnapshotOnRequest:
    trigger: ConfigurationSnapshotRequested (command)
    action: GenerateSnapshot
    target: Payroll Configuration BC

  P014_ValidateProfileBeforeDelete:
    trigger: DeletePayProfile (command)
    action: ValidateProfileUsage
    target: Validation BC

