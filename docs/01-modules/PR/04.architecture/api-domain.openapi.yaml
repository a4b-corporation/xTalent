          type: string
          format: uuid
        legal_entity_id:
          type: string
          format: uuid
        effective_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        assigned_by:
          type: string
        created_at:
          type: string
          format: date-time

    CreateWorkerAssignmentRequest:
      type: object
