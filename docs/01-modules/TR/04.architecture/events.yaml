    bounded_context: BC-05
    kafka_topic: tr.points-earned.v1
    trigger: Worker sends peer recognition or milestone auto-award
    payload:
      transaction_id: uuid
      recipient_worker_id: uuid
      from_worker_id: uuid_nullable
      points: integer
      balance_after: integer
      expiry_date: date
      transaction_type: string
      program_id: uuid
    consumers:
      - BC-10 Audit & Observability
    retention_days: 365
    ordering_key: recipient_worker_id

  - name: PointsRedeemed
    version: "1.0"
    event_id: E-REC-004
    bounded_context: BC-05
    kafka_topic: tr.points-redeemed.v1
