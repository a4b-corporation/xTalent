      candidate_id: string
      legal_entity_id: uuid
      position_title: string
      proposed_salary: decimal
      salary_currency: string
      created_by: uuid
      min_wage_check_passed: boolean
    consumers:
      - BC-10 Audit & Observability
    retention_days: 365
    ordering_key: offer_id

  - name: OfferApproved
    version: "1.0"
    event_id: E-OM-003
    bounded_context: BC-06
    kafka_topic: tr.offer-approved.v1
    trigger: Budget Approver approves offer
    payload:
