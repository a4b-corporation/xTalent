# ============================================================
# Event Repository — Total Rewards / xTalent HCM
# Version: 1.0.0
# Date: 2026-03-26
#
# Aggregated from:
#   - Event Storming (reality/event-storming.md) — 55 events
#   - BC Glossaries (domain/*/glossary.md)
#   - Use Case Flows (domain/*/flows/*.flow.md)
#   - BC interaction contracts (bounded-contexts.md)
#
# Kafka config defaults:
#   - At-least-once delivery (consumers must be idempotent)
#   - Ordering key = worker_id for per-worker events
#   - Retention: 90 days default; 365 days for audit events
#   - Schema registry: Confluent Schema Registry (Avro/JSON Schema)
# ============================================================

kafka_defaults:
  bootstrap_servers: kafka.xtalent.vng.com.vn:9092
  schema_registry: https://schema-registry.xtalent.vng.com.vn
  delivery_guarantee: at_least_once
  consumer_dedup_required: true

events:

  # ============================================================
  # BC-01: Compensation Management
  # ============================================================

  - name: SalaryStructureCreated
    version: "1.0"
    event_id: E-CC-001
    bounded_context: BC-01
    kafka_topic: tr.salary-structure-created.v1
    trigger: HR Admin creates a new SalaryBasis with PayComponentDefs
    payload:
      salary_basis_id: uuid
      name: string
      pay_frequency: string
      default_currency: string
      country_code: string
      component_count: integer
      created_by: uuid
    consumers:
      - BC-10 Audit & Observability
    retention_days: 365
    ordering_key: salary_basis_id

  - name: CompensationCycleOpened
    version: "1.0"
    event_id: E-CC-004
