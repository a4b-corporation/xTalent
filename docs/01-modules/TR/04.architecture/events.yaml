  # ============================================================
  # BC-10: Audit & Observability
  # ============================================================

  - name: AuditRecordCreated
    version: "1.0"
    event_id: E-AUD-001
    bounded_context: BC-10
    kafka_topic: tr.audit-records.v1
    trigger: Any TR entity change from any BC — captured via event subscription
    description: |
      Immutable append-only. Cannot be modified or deleted after creation.
      7-year retention minimum; indefinite for executive compensation records.
    payload:
      audit_id: uuid
      entity_type: string
      entity_id: uuid
      action: string
      actor_id: uuid
      actor_role: string
      before_state: object_nullable
      after_state: object_nullable
      bc_source: string
      created_at: datetime
    consumers:
      - Audit Storage (write-once)
      - Compliance Reporting Service
    retention_days: 2555
    ordering_key: entity_id

  - name: AnomalyDetected
    version: "1.0"
