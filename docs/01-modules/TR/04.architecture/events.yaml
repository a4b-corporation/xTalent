      period_from: date
      period_to: date
      generated_by: uuid
      report_url: string
      generated_at: datetime
    consumers:
      - Notification Service
    retention_days: 365
    ordering_key: report_id

  - name: UnauthorizedAccessAttempted
    version: "1.0"
    event_id: E-AUD-004
    bounded_context: BC-10
    kafka_topic: tr.unauthorized-access-attempted.v1
