      perk_catalog_id: uuid
      taxable_amount: decimal
      currency: string
      period: string
    consumers:
      - BC-08 Taxable Bridge
      - BC-10 Audit & Observability
    retention_days: 365
    ordering_key: worker_id

  - name: MilestoneDetected
    version: "1.0"
    event_id: E-REC-006
    bounded_context: BC-05
    kafka_topic: tr.milestone-detected.v1
    trigger: System detects work anniversary or birthday from CO events
    payload:
      worker_id: uuid
      milestone_type: string
      milestone_date: date
      auto_recognition_triggered: boolean
    consumers:
      - BC-05 Recognition Engine (auto-award)
      - BC-10 Audit & Observability
    retention_days: 90
    ordering_key: worker_id

