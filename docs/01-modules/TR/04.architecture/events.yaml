      - BC-10 Audit & Observability
    retention_days: 365
    ordering_key: offer_id

  - name: OfferExpired
    version: "1.0"
    event_id: E-OM-007
    bounded_context: BC-06
    kafka_topic: tr.offer-expired.v1
    trigger: Offer expiry_date reached without candidate response
    payload:
