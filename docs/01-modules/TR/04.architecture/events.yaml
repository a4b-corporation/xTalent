      worker_id: uuid
      period: string
      minutes_elapsed: integer
      retry_count: integer
    consumers:
      - Payroll Admin notification
      - HR Admin notification
      - BC-10 Audit & Observability
    retention_days: 30
    ordering_key: worker_id

