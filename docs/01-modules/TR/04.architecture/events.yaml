  - name: StatementViewed
    version: "1.0"
    event_id: E-ST-002
    bounded_context: BC-07
    kafka_topic: tr.statement-viewed.v1
    trigger: Worker views their TR statement
    payload:
      statement_id: uuid
      worker_id: uuid
      statement_year: integer
      viewed_at: datetime
    consumers:
      - BC-10 Audit & Observability
    retention_days: 365
    ordering_key: worker_id

  # ============================================================
  # BC-08: Taxable Bridge
  # ============================================================

  - name: TaxableItemCreated
    version: "1.0"
    event_id: E-TX-006
    bounded_context: BC-08
    kafka_topic: tr.taxable-items.v1
    trigger: Any BC publishes taxable event (equity vest, bonus approval, benefit in-kind, perk redemption)
    description: |
      Idempotency guaranteed via idempotency_key.
      Dedup window: 24 hours. ON CONFLICT → status = DUPLICATE.
      Payroll must ack within 15 minutes.
    payload:
      taxable_item_id: uuid
      worker_id: uuid
      working_relationship_id: uuid_nullable
      source_type: string
      source_ref_id: uuid_nullable
      amount: decimal
      currency: string
      period: string
      idempotency_key: string
    consumers:
      - Payroll Module (SLA: ack within 15 min)
      - BC-09 Tax & Compliance
      - BC-10 Audit & Observability
    retention_days: 90
    ordering_key: worker_id

  - name: PayrollBridgeProcessed
    version: "1.0"
    event_id: E-TX-007
    bounded_context: BC-08
    kafka_topic: tr.payroll-bridge-processed.v1
