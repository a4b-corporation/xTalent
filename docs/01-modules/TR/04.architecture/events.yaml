  - name: SalaryChanged
    version: "1.0"
    event_id: E-CC-008
    bounded_context: BC-01
    kafka_topic: tr.salary-changed.v1
    trigger: ActivateSalaryChange command — cron detects effective_date = today
    description: |
      Critical event for Payroll bridge. SCD Type 2 operation completed.
      Previous salary_record closed; new record inserted.
      SLA: Payroll must ack within 15 minutes.
    payload:
      worker_id: uuid
      working_relationship_id: uuid
      previous_salary_record_id: uuid
      new_salary_record_id: uuid
      previous_amount: decimal
      new_amount: decimal
      currency: string
      effective_date: date
      change_reason: string
      period: string
    consumers:
      - BC-08 Taxable Bridge
      - Payroll Module (SLA: ack within 15 min)
      - BC-10 Audit & Observability
    retention_days: 90
    ordering_key: worker_id

