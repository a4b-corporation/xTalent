<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <filter id="shadow1" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-opacity="0.08" flood-color="#000"/>
    </filter>
    <filter id="shadow2" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-opacity="0.06" flood-color="#000"/>
    </filter>
    <linearGradient id="purpleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="grayGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#94a3b8" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#94a3b8" stop-opacity="0.01"/>
    </linearGradient>
  </defs>

  <!-- Left Card: The 6% Leaders -->
  <g filter="url(#shadow1)">
    <rect x="20" y="20" width="340" height="360" rx="16" fill="white" stroke="#e2e5f0" stroke-width="1"/>
    <rect x="20" y="20" width="340" height="360" rx="16" fill="url(#purpleGrad)"/>
    <rect x="20" y="20" width="5" height="360" rx="3" fill="#6366f1"/>
  </g>

  <text x="50" y="62" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#4338ca">The 6% Leaders</text>

  <text x="50" y="120" font-family="Arial, sans-serif" font-size="56" font-weight="800" fill="#6366f1">6%</text>

  <!-- Bullet points - Leaders -->
  <circle cx="52" cy="162" r="3" fill="#6366f1"/>
  <text x="64" y="166" font-family="Arial, sans-serif" font-size="14" fill="#475569">Rewiring operating model</text>

  <circle cx="52" cy="198" r="3" fill="#6366f1"/>
  <text x="64" y="202" font-family="Arial, sans-serif" font-size="14" fill="#475569">200–2000% productivity gains</text>

  <circle cx="52" cy="234" r="3" fill="#6366f1"/>
  <text x="64" y="238" font-family="Arial, sans-serif" font-size="14" fill="#475569">AI-first architecture</text>

  <circle cx="52" cy="270" r="3" fill="#6366f1"/>
  <text x="64" y="274" font-family="Arial, sans-serif" font-size="14" fill="#475569">Self-evolving systems</text>

  <!-- VS separator -->
  <text x="400" y="210" font-family="Arial, sans-serif" font-size="20" font-weight="600" fill="#cbd5e1" text-anchor="middle">vs</text>

  <!-- Right Card: The 94% Laggards -->
  <g filter="url(#shadow2)">
    <rect x="440" y="20" width="340" height="360" rx="16" fill="white" stroke="#e8eaed" stroke-width="1"/>
    <rect x="440" y="20" width="340" height="360" rx="16" fill="url(#grayGrad)"/>
    <rect x="440" y="20" width="5" height="360" rx="3" fill="#94a3b8"/>
  </g>

  <text x="470" y="62" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#64748b">The 94% Laggards</text>

  <text x="470" y="120" font-family="Arial, sans-serif" font-size="56" font-weight="800" fill="#94a3b8">94%</text>

  <!-- Bullet points - Laggards -->
  <circle cx="472" cy="162" r="3" fill="#94a3b8"/>
  <text x="484" y="166" font-family="Arial, sans-serif" font-size="14" fill="#475569">AI as add-on layer</text>

  <circle cx="472" cy="198" r="3" fill="#94a3b8"/>
  <text x="484" y="202" font-family="Arial, sans-serif" font-size="14" fill="#475569">95% pilot failure rate</text>

  <circle cx="472" cy="234" r="3" fill="#94a3b8"/>
  <text x="484" y="238" font-family="Arial, sans-serif" font-size="14" fill="#475569">Legacy architecture</text>

  <circle cx="472" cy="270" r="3" fill="#94a3b8"/>
  <text x="484" y="274" font-family="Arial, sans-serif" font-size="14" fill="#475569">Manual processes</text>

</svg>