isible"><span style="overflow:visible;color:#262626;font-weight:bold;font-size:14px;line-height:1.4;width:100%;height:100%;display:flex;flex-wrap:wrap;word-break:break-word;white-space:pre-wrap;text-align:right;justify-content:flex-end;align-content:center;align-items:center" xmlns="http://www.w3.org/1999/xhtml">Tầng 3 — Full-Text Search (FTS5)</span></foreignObject></g><g transform="translate(0, 20)"><foreignObject height="40" width="120" y="0" x="0" overflow="visible"><span style="overflow:visible;color:#5a5a5a;font-size:14px;line-height:1.4;width:100%;height:100%;display:flex;flex-wrap:wrap;word-break:break-word;white-space:pre-wrap;text-align:right;justify-content:flex-end;align-content:flex-start;align-items:flex-start" xmlns="http://www.w3.org/1999/xhtml">Keyword-based search cho technical terms, proper nouns, exact match. Hybrid search = Tầng 1 + 2 + 3</span></foreignObject></g></g><g transform="translate(135, 0)"><polygon width="30" height="140" fill="#f0884d" points="0,0 15,10 30,0 30,130 15,140 0,130" /><g><text width="30" height="140" x="15" y="70" fill="#ffffff" font-size="16" text-anchor="middle" dominant-baseline="central" font-weight="bold">03</text></g></g></g></g></g></g></g></svg>