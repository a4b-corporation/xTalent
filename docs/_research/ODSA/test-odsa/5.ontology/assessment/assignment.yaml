id: https://xtalent.io/ontology/ats/assessment/assignment
name: assignment_ontology
version: "1.0.0"
description: "Assignment - Bài kiểm tra Online được TA tạo và gửi cho Students"

prefixes:
  xt: https://xtalent.io/ontology/
  oracle: https://oracle.com/hcm/
  sap: https://successfactors.sap.com/
  workday: https://workday.com/

imports:
  - ./submission.yaml
  - ./grading.yaml
  - ./grading-task.yaml

default_range: string

slots:
  # --- Identifier ---
  assignment_id:
    description: "Unique identifier cho Assignment"
    identifier: true
    required: true
    pattern: "^ASMNT-\\d{6}$"
    annotations:
      example: "ASMNT-000001"

  # --- Core Fields ---
  event_id:
    description: "Event ID mà Assignment thuộc về"
    required: true
    annotations:
      reference: "Event.event_id"

  title:
    description: "Tiêu đề Assignment"
    required: true

  description:
    description: "Mô tả chi tiết Assignment"
    required: false

  link:
    description: "Link làm bài (Google Form, TestGorilla, etc.)"
    required: true

  attachment_id:
    description: "Attachment ID (file đính kèm nếu có)"
    required: false
    annotations:
      reference: "Attachment.attachment_id"

  deadline:
    description: "Deadline nộp bài"
    range: datetime
    required: true

  status:
    description: "Trạng thái Assignment"
    range: AssignmentStatusEnum
    required: true

  graders:
    description: "Danh sách Grader IDs được phân công chấm"
    range: string
    multivalued: true
    required: false

  allowed_file_types:
    description: "Các loại file được phép nộp (configurable)"
    range: string
    multivalued: true
    required: false

  max_file_size:
    description: "Kích thước file tối đa (bytes, configurable)"
    range: integer
    minimum_value: 0
    required: false

  multiple_files_allowed:
    description: "Cho phép nộp nhiều file (không cần zip)"
    range: boolean
    required: false

  # --- Audit Fields ---
  created_by:
    description: "User ID tạo Assignment (TA)"
    required: true
    annotations:
      reference: "User.user_id"

  created_at:
    description: "Timestamp tạo Assignment"
    range: datetime
    required: true

  updated_at:
    description: "Timestamp cập nhật Assignment"
    range: datetime
    required: false

classes:
  Assignment:
    description: |
      Assignment - Bài kiểm tra Online được TA tạo và gửi cho Students.
      Students nộp bài qua link trước deadline.
      Managers được phân công chấm bài.
      Aggregate Root trong Assessment context.

    annotations:
      oracle_hcm_term: "OnlineAssessment"
      sap_term: "OnlineAssessment"
      workday_term: "OnlineAssessment"
      disambiguation: "xTalent: Assignment = Bài kiểm tra Online. Oracle: OnlineAssessment. SAP: OnlineAssessment. Workday: OnlineAssessment. Xem docs.xtalent.io/ats/assessment/assignment."

      module: "ats"
      sub_module: "assessment"
      version: "1.0.0"
      bounded_context: "Assessment"
      aggregate_root: true

      ouroboros_evolution:
        iteration: "1.0.0"
        parent_version: null
        evaluation_status: "pending"
        last_evaluated: null
        evolution_notes: "Initial version"

      validation_hooks:
        odds_system_builder:
          required_for: true
          validates: ["table_generation", "fk_references"]

      see_also: "https://docs.xtalent.io/ats/assessment/assignment"

    slots:
      - assignment_id
      - event_id
      - title
      - description
      - link
      - attachment_id
      - deadline
      - status
      - graders
      - allowed_file_types
      - max_file_size
      - multiple_files_allowed
      - created_by
      - created_at
      - updated_at

    slot_usage:
      assignment_id:
        required: true
        identifier: true

      event_id:
        required: true

      title:
        required: true

      link:
        required: true

      deadline:
        required: true

      status:
        required: true

      created_by:
        required: true

      created_at:
        required: true

    rules:
      - description: "BRS-ASM-001: Chỉ Managers được TA phân công mới chấm được Assignment"
        preconditions:
          slot_conditions:
            graders:
              list_has_length:
                min_length: 1
        postconditions:
          slot_conditions:
            grader_id:
              must_be_in_list: "graders"

      - description: "BRS-ASM-003: File submission phải đúng format (Word/PDF/Excel/PPT)"
        preconditions:
          slot_conditions: {}
        postconditions:
          slot_conditions:
            allowed_file_types:
              list_contains_all_of: ["PDF", "DOC", "DOCX", "XLS", "XLSX", "PPT", "PPTX"]

      - description: "BRS-ASM-005: Student được nộp nhiều file (không cần zip)"
        preconditions:
          slot_conditions: {}
        postconditions:
          slot_conditions:
            multiple_files_allowed:
              equals_boolean: true

# === ENUMS ===
enums:
  AssignmentStatusEnum:
    description: "Trạng thái Assignment"
    permissible_values:
      DRAFT:
        description: "Đang nháp"
      ACTIVE:
        description: "Đang mở nộp bài"
      CLOSED:
        description: "Đã đóng (qua deadline)"
      GRADING:
        description: "Đang chấm"
      COMPLETED:
        description: "Hoàn tất chấm"
      CANCELLED:
        description: "Đã hủy"
