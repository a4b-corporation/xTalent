id: https://xtalent.io/ontology/ats/assessment/grading
name: grading_ontology
version: "1.0.0"
description: "Grading - Kết quả chấm bài Assignment/Submission"

prefixes:
  xt: https://xtalent.io/ontology/
  oracle: https://oracle.com/hcm/
  sap: https://successfactors.sap.com/
  workday: https://workday.com/

default_range: string

slots:
  # --- Identifier ---
  grading_id:
    description: "Unique identifier cho Grading"
    identifier: true
    required: true
    pattern: "^GRD-\\d{6}$"
    annotations:
      example: "GRD-000001"

  # --- Core Fields ---
  submission_id:
    description: "Submission ID được chấm"
    required: true
    annotations:
      reference: "Submission.submission_id"

  grader_id:
    description: "User ID người chấm (Manager)"
    required: true
    annotations:
      reference: "User.user_id"

  score:
    description: "Điểm số"
    range: float
    minimum_value: 0.0
    maximum_value: 100.0
    required: true

  comment:
    description: "Nhận xét của grader"
    required: false

  pass_fail:
    description: "Đạt/Không đạt"
    range: PassFailEnum
    required: true

  graded_at:
    description: "Thời điểm chấm xong"
    range: datetime
    required: true

  # --- Audit Fields ---
  created_by:
    description: "Grader ID"
    required: true
    annotations:
      reference: "User.user_id"

  created_at:
    description: "Timestamp tạo Grading record"
    range: datetime
    required: true

classes:
  Grading:
    description: |
      Grading - Kết quả chấm bài Assignment/Submission.
      Manager được phân công chấm bài và đưa ra điểm số + nhận xét.
      Aggregate Root trong Assessment context.

    annotations:
      oracle_hcm_term: "AssessmentGrading"
      sap_term: "AssessmentGrading"
      workday_term: "AssessmentGrading"
      disambiguation: "xTalent: Grading = Kết quả chấm bài. Oracle: AssessmentGrading. SAP: AssessmentGrading. Workday: AssessmentGrading. Xem docs.xtalent.io/ats/assessment/grading."

      module: "ats"
      sub_module: "assessment"
      version: "1.0.0"
      bounded_context: "Assessment"
      aggregate_root: true

      ouroboros_evolution:
        iteration: "1.0.0"
        parent_version: null
        evaluation_status: "pending"
        last_evaluated: null
        evolution_notes: "Initial version"

      validation_hooks:
        odds_system_builder:
          required_for: true
          validates: ["table_generation", "fk_references"]

      see_also: "https://docs.xtalent.io/ats/assessment/grading"

    slots:
      - grading_id
      - submission_id
      - grader_id
      - score
      - comment
      - pass_fail
      - graded_at
      - created_by
      - created_at

    slot_usage:
      grading_id:
        required: true
        identifier: true

      submission_id:
        required: true

      grader_id:
        required: true

      score:
        required: true

      pass_fail:
        required: true

      graded_at:
        required: true

      created_by:
        required: true

      created_at:
        required: true

    rules:
      - description: "BRS-GRD-001: Chỉ Managers được TA phân công mới chấm được Assignment"
        preconditions:
          slot_conditions:
            submission_id:
              slot_value_conditions:
                assignment_id:
                  slot_value_conditions:
                    graders:
                      list_has_length:
                        min_length: 1
        postconditions:
          slot_conditions:
            grader_id:
              must_be_in_list: "assignment.graders"

      - description: "BRS-GRD-002: Score phải trong khoảng 0-100"
        preconditions:
          slot_conditions: {}
        postconditions:
          slot_conditions:
            score:
              minimum_value: 0
              maximum_value: 100

# === ENUMS ===
enums:
  PassFailEnum:
    description: "Kết quả Đạt/Không đạt"
    permissible_values:
      PASS:
        description: "Đạt"
      FAIL:
        description: "Không đạt"
      NEEDS_DISCUSSION:
        description: "Cần thảo luận thêm"
