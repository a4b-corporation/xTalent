id: https://xtalent.io/ontology/ats/event-management/request-mapping
name: request_mapping_ontology
version: "1.0.0"
description: "Mapping giữa Event và Request tuyển dụng từ hệ thống khác"

prefixes:
  xt: https://xtalent.io/ontology/
  oracle: https://oracle.com/hcm/
  sap: https://successfactors.sap.com/
  workday: https://workday.com/

default_range: string

slots:
  # --- Identifier ---
  mapping_id:
    description: "Unique identifier cho RequestMapping"
    identifier: true
    required: true
    pattern: "^MAP-\\d{6}$"
    annotations:
      example: "MAP-000001"

  # --- Core Fields ---
  event_id:
    description: "Event ID mà Request được map vào"
    required: true
    annotations:
      reference: "Event.event_id"

  request_id:
    description: "Request ID từ hệ thống tuyển dụng (external)"
    required: true

  request_type:
    description: "Loại Request (Fresher, Intern, Employee, etc.)"
    required: true
    range: RequestTypeEnum

  position_title:
    description: "Tên vị trí tuyển dụng"
    required: true

  department:
    description: "Phòng ban tuyển dụng"
    required: false

  hiring_manager:
    description: "Hiring Manager của Request"
    required: false
    annotations:
      reference: "User.user_id"

  headcount:
    description: "Số lượng tuyển"
    range: integer
    minimum_value: 1
    required: true

  status:
    description: "Trạng thái mapping"
    range: RequestMappingStatusEnum
    required: true

  mapped_at:
    description: "Thời điểm map Request vào Event"
    range: datetime
    required: true

  # --- Audit Fields ---
  created_by:
    description: "User ID tạo mapping"
    required: true
    annotations:
      reference: "User.user_id"

  created_at:
    description: "Timestamp tạo mapping"
    range: datetime
    required: true

classes:
  RequestMapping:
    description: |
      Mapping giữa Event và Request tuyển dụng từ hệ thống khác.
      Chỉ Request type 'Fresher' và status 'Approved' mới được map.
      Aggregate Root trong Event Management context.

    annotations:
      oracle_hcm_term: "JobRequisitionMapping"
      sap_term: "JobRequisitionMapping"
      workday_term: "JobRequisitionMapping"
      disambiguation: "xTalent: RequestMapping = Liên kết Event với Request. Oracle: JobRequisitionMapping. SAP: JobRequisitionMapping. Workday: JobRequisitionMapping. Xem docs.xtalent.io/ats/event-management/request-mapping."

      module: "ats"
      sub_module: "event-management"
      version: "1.0.0"
      bounded_context: "Event Management"
      aggregate_root: true

      ouroboros_evolution:
        iteration: "1.0.0"
        parent_version: null
        evaluation_status: "pending"
        last_evaluated: null
        evolution_notes: "Initial version"

      validation_hooks:
        odds_system_builder:
          required_for: true
          validates: ["table_generation", "fk_references"]

      see_also: "https://docs.xtalent.io/ats/event-management/request-mapping"

    slots:
      - mapping_id
      - event_id
      - request_id
      - request_type
      - position_title
      - department
      - hiring_manager
      - headcount
      - status
      - mapped_at
      - created_by
      - created_at

    slot_usage:
      mapping_id:
        required: true
        identifier: true

      event_id:
        required: true

      request_id:
        required: true

      request_type:
        required: true

      position_title:
        required: true

      headcount:
        required: true

      status:
        required: true

      mapped_at:
        required: true

      created_by:
        required: true

      created_at:
        required: true

    rules:
      - description: "BRS-EM-MAP-001: Chỉ Request type 'Fresher' mới được map"
        preconditions:
          slot_conditions: {}
        postconditions:
          slot_conditions:
            request_type:
              equals_string: "FRESHER"

      - description: "BRS-EM-MAP-002: Một Request chỉ được map 1 Event duy nhất"
        preconditions:
          slot_conditions:
            request_id:
              slot_value_conditions:
                must_be_unique: true
        postconditions:
          slot_conditions: {}

      - description: "BRS-EM-MAP-005: Không được unmap Request nếu đã có Student apply"
        preconditions:
          slot_conditions:
            application_count:
              minimum_value: 1
        postconditions:
          slot_conditions:
            status:
              not_equals_string: "UNMAPPED"

# === ENUMS ===
enums:
  RequestTypeEnum:
    description: "Loại Request tuyển dụng"
    permissible_values:
      FRESHER:
        description: "Tuyển dụng Fresher"
      INTERN:
        description: "Tuyển dụng Intern"
      EMPLOYEE:
        description: "Tuyển dụng nhân viên chính thức"
      CONTRACTOR:
        description: "Tuyển dụng contractor"

  RequestMappingStatusEnum:
    description: "Trạng thái mapping"
    permissible_values:
      ACTIVE:
        description: "Mapping đang active"
      INACTIVE:
        description: "Mapping không còn active"
      CANCELLED:
        description: "Mapping đã hủy"
