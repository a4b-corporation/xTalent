        score:
          type: number
          format: float
          minimum: 0.0
          maximum: 100.0
          description: "Điểm số"
          example: 78.5
        comment:
          type: string
          description: "Nhận xét của grader"
          example: "Làm bài tốt, code sạch"
        pass_fail:
          $ref: "#/components/schemas/PassFailEnum"

    # === Entity Schemas ===

    TestSlot:
      type: object
      required:
        - slot_id
        - event_id
        - slot_name
        - test_date
        - start_time
        - end_time
        - location
        - room
        - max_capacity
        - status
        - created_by
        - created_at
