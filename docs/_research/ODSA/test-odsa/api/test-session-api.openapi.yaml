          description: "Thời gian check-in thực tế"
          example: "2026-04-27T07:45:00Z"
        is_late:
          type: boolean
          description: "Check-in muộn (sau grace period). Auto-calculated nếu không cung cấp."
          readOnly: true
        late_reason:
          type: string
          description: "Lý do check-in muộn"
