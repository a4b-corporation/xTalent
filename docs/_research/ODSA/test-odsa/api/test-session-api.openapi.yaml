          maximum: 72
          description: "Time Window để confirm (giờ, configurable, default: 24h)"
          default: 24
        max_retry:
          type: integer
          minimum: 0
          maximum: 5
          description: "Số lần retry auto-allocate (configurable, default: 2)"
