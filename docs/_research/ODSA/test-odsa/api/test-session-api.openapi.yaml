        event_id:
          type: string
          pattern: "^EVT-\\d{6}$"
          description: "Event ID mà TestSlot thuộc về"
          example: "EVT-000001"
        slot_name:
          type: string
          description: "Tên ca thi"
          example: "Ca sáng 08:00-12:00"
        description:
          type: string
          description: "Mô tả ca thi"
          example: "Ca thi sáng tại Hà Nội"
        test_date:
          type: string
          format: date
          description: "Ngày thi"
          example: "2026-04-27"
        start_time:
          type: string
          format: time
          description: "Giờ bắt đầu"
          example: "08:00"
        end_time:
          type: string
          format: time
          description: "Giờ kết thúc"
          example: "12:00"
        location:
          type: string
          description: "Địa điểm thi"
          example: "Hà Nội"
        room:
          type: string
          description: "Phòng thi"
          example: "Phòng 301"
        max_capacity:
          type: integer
          minimum: 1
          description: "Số lượng tối đa"
          example: 30
        current_capacity:
          type: integer
          minimum: 0
          description: "Số lượng hiện tại đã allocate"
          example: 25
        graders:
          type: array
          items:
            type: string
            pattern: "^MGR-\\d{3}$"
          description: "Danh sách Grader IDs được phân công chấm"
          example: ["MGR-001", "MGR-002"]
        status:
          $ref: "#/components/schemas/TestSlotStatusEnum"
        auto_allocate_enabled:
          type: boolean
          description: "Bật auto allocate (FCFS + Time Window)"
          example: true
        time_window_hours:
          type: integer
          minimum: 1
          maximum: 72
          description: "Time Window để confirm (giờ)"
          example: 24
        max_retry:
          type: integer
          minimum: 0
          maximum: 5
          description: "Số lần retry auto-allocate"
          example: 2
        notify_ta_on_allocate:
          type: boolean
          description: "Notify TA khi auto-allocate thành công"
          example: true
        photo_capture_required:
          type: boolean
          description: "Bắt buộc chụp hình khi check-in"
          example: false
        grace_period_minutes:
          type: integer
          minimum: 0
          maximum: 60
          description: "Grace period cho check-in muộn (phút)"
          example: 15
        created_by:
          type: string
          pattern: "^(TA|USER)-\\d{3}$"
          description: "User ID tạo TestSlot (TA)"
          example: "TA-001"
        created_at:
          type: string
          format: date-time
          description: "Timestamp tạo TestSlot"
          example: "2026-03-20T10:30:00Z"
        updated_at:
          type: string
          format: date-time
          description: "Timestamp cập nhật TestSlot"
          example: "2026-03-20T10:35:00Z"

    Schedule:
      type: object
      required:
        - schedule_id
        - slot_id
        - application_id
        - candidate_rr_id
        - status
        - created_by
        - created_at
      properties:
        schedule_id:
          type: string
          pattern: "^TSCH-\\d{6}$"
          description: "Unique identifier cho Schedule"
          example: "TSCH-000001"
        slot_id:
          type: string
          pattern: "^TSLOT-\\d{6}$"
          description: "TestSlot ID mà Student được chia"
          example: "TSLOT-000001"
        application_id:
          type: string
          pattern: "^APP-\\d{6}$"
          description: "Application ID của Student"
          example: "APP-000001"
        candidate_rr_id:
          type: string
          pattern: "^CRR-\\d{6}$"
          description: "Candidate RR ID"
          example: "CRR-000001"
        sbd:
          type: string
          pattern: "^SBD-\\d{8}$"
          description: "Số báo danh (auto gen khi được chia vào slot, pattern: SBD-YYYYNNNN)"
          example: "SBD-20260001"
        status:
          $ref: "#/components/schemas/ScheduleStatusEnum"
        confirmed_at:
          type: string
          format: date-time
          description: "Thời điểm confirm tham gia"
          example: "2026-03-20T11:00:00Z"
        confirm_deadline:
          type: string
          format: date-time
          description: "Deadline confirm (Time Window, configurable)"
          example: "2026-03-21T10:30:00Z"
        change_count:
          type: integer
          minimum: 0
          maximum: 2
          description: "Số lần đổi lịch (max 1 lần)"
          example: 0
        created_by:
          type: string
          description: "System auto tạo"
          example: "SYSTEM"
        created_at:
          type: string
          format: date-time
          description: "Timestamp tạo Schedule"
          example: "2026-03-20T10:30:00Z"
        updated_at:
          type: string
          format: date-time
          description: "Timestamp cập nhật Schedule"
          example: "2026-03-20T11:00:00Z"

    CheckIn:
      type: object
      required:
        - check_in_id
        - schedule_id
        - actual_time
        - checked_in_by
        - created_at
      properties:
        check_in_id:
          type: string
          pattern: "^TCI-\\d{6}$"
          description: "Unique identifier cho CheckIn"
          example: "TCI-000001"
        schedule_id:
          type: string
          pattern: "^TSCH-\\d{6}$"
          description: "Schedule ID mà Student check-in"
          example: "TSCH-000001"
        actual_time:
          type: string
          format: date-time
          description: "Thời gian check-in thực tế"
          example: "2026-04-27T07:45:00Z"
        is_late:
          type: boolean
          description: "Check-in muộn (sau grace period)"
          example: false
        late_reason:
          type: string
          description: "Lý do check-in muộn"
          example: "Kẹt xe"
        photo_id:
          type: string
          pattern: "^ATT-\\d{3}$"
          description: "Photo ID (chụp hình khi check-in, configurable)"
          example: "ATT-001"
        checked_in_by:
          type: string
          pattern: "^(TA|USER)-\\d{3}$"
          description: "User ID thực hiện check-in (TA hoặc self)"
          example: "TA-001"
        created_at:
          type: string
          format: date-time
          description: "Timestamp tạo CheckIn record"
          example: "2026-04-27T07:45:00Z"

    Grading:
      type: object
      required:
        - grading_id
        - schedule_id
        - grader_id
        - score
        - pass_fail
        - graded_at
        - created_by
        - created_at
      properties:
        grading_id:
          type: string
          pattern: "^TGRD-\\d{6}$"
          description: "Unique identifier cho Grading"
          example: "TGRD-000001"
        schedule_id:
          type: string
          pattern: "^TSCH-\\d{6}$"
          description: "Schedule ID được chấm"
          example: "TSCH-000001"
        grader_id:
          type: string
          pattern: "^MGR-\\d{3}$"
          description: "User ID người chấm (Manager)"
          example: "MGR-001"
        score:
          type: number
          format: float
          minimum: 0.0
          maximum: 100.0
          description: "Điểm số"
          example: 78.5
        comment:
          type: string
          description: "Nhận xét của grader"
          example: "Làm bài tốt, code sạch"
        pass_fail:
          $ref: "#/components/schemas/PassFailEnum"
        graded_at:
          type: string
          format: date-time
          description: "Thời điểm chấm xong"
          example: "2026-04-27T14:00:00Z"
        created_by:
          type: string
          pattern: "^(MGR|USER)-\\d{3}$"
          description: "Grader ID"
          example: "MGR-001"
        created_at:
          type: string
          format: date-time
          description: "Timestamp tạo Grading record"
          example: "2026-04-27T14:00:00Z"

    # === Enum Schemas ===

    TestSlotStatusEnum:
      type: string
      enum:
        - DRAFT
        - ACTIVE
        - IN_PROGRESS
        - COMPLETED
        - CANCELLED
      description: |
        Trạng thái ca thi

        - **DRAFT:** Đang nháp
        - **ACTIVE:** Đang mở đăng ký
        - **IN_PROGRESS:** Đang diễn ra
        - **COMPLETED:** Hoàn tất
        - **CANCELLED:** Đã hủy

      x-lifecycle:
        transitions:
          DRAFT:
            to: ACTIVE
            by: "TA publish TestSlot"
          ACTIVE:
            to:
              - IN_PROGRESS
              - CANCELLED
            by:
              - "Đến ngày giờ thi (test_date + start_time)"
              - "TA hủy TestSlot"
          IN_PROGRESS:
            to: COMPLETED
            by: "Tất cả Candidates đã thi và chấm xong"

    ScheduleStatusEnum:
      type: string
      enum:
        - PENDING
        - CONFIRMED
        - RESCHEDULED
        - COMPLETED
        - NO_SHOW
        - CANCELLED
      description: |
        Trạng thái lịch thi

        - **PENDING:** Chưa confirm
        - **CONFIRMED:** Đã confirm
        - **RESCHEDULED:** Đã đổi lịch
        - **COMPLETED:** Hoàn tất
        - **NO_SHOW:** Không đến
        - **CANCELLED:** Đã hủy

      x-lifecycle:
        transitions:
          PENDING:
            to:
              - CONFIRMED
              - RESCHEDULED
              - CANCELLED
            by:
              - "Student confirm tham gia"
              - "Student đổi lịch (change_count = 1)"
              - "TA hủy schedule"
          CONFIRMED:
            to:
              - COMPLETED
              - NO_SHOW
            by:
              - "Student hoàn thành thi"
              - "Student không đến (không check-in)"
          RESCHEDULED:
            to: CONFIRMED
            by: "Student confirm lịch mới"

    PassFailEnum:
      type: string
      enum:
        - PASS
        - FAIL
        - NEEDS_DISCUSSION
      description: |
        Kết quả Đạt/Không đạt

        - **PASS:** Đạt
        - **FAIL:** Không đạt
        - **NEEDS_DISCUSSION:** Cần thảo luận thêm

    # === Error Schemas ===

    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: "Error code"
          example: "INVALID_STATUS"
        message:
          type: string
          description: "Human-readable error message"
          example: "Cannot confirm Schedule TSCH-000001: confirm deadline has passed"
        details:
          type: object
          description: "Additional error details"
          additionalProperties: true

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          examples:
            example-1:
              summary: Invalid date format
              value:
                code: "INVALID_FORMAT"
                message: "Invalid date format for test_date: expected YYYY-MM-DD"
                details:
                  field: "test_date"
                  value: "04-27-2026"
                  expected_format: "YYYY-MM-DD"
            example-2:
              summary: Missing required field
              value:
                code: "MISSING_FIELD"
                message: "Missing required field: max_capacity"
                details:
                  field: "max_capacity"
                  required: true

    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            code: "UNAUTHORIZED"
            message: "Authentication required"

    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            code: "FORBIDDEN"
            message: "User TA-002 does not have permission to create TestSlots for Event EVT-000001"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          examples:
            example-1:
              summary: TestSlot not found
              value:
                code: "NOT_FOUND"
                message: "TestSlot TSLOT-000001 not found"
                details:
                  resource_type: "TestSlot"
                  resource_id: "TSLOT-000001"
            example-2:
              summary: Schedule not found
              value:
                code: "NOT_FOUND"
                message: "Schedule TSCH-000001 not found"
                details:
                  resource_type: "Schedule"
                  resource_id: "TSCH-000001"
