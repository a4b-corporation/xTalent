---
# Event: ApplicationOffered
# Transition: INTERVIEW → OFFER
# Trigger: Interview passed, offer created
# Actor: HR/Recruiter

event_type: ApplicationOffered
version: "1.0.0"
description: |
  Event được emit khi application vượt qua vòng interview và được đưa offer.

  Use Case: UC-OFF-001 - Create Offer

  Event này trigger Offer context để tạo offer cho application.
category: application.lifecycle
aggregate_root: Application
aggregate_id_field: application_id
correlation_id_field: event_id
causation_id_field: ApplicationMovedToInterview.event_id

trigger:
  type: command
  command: CreateOffer
  use_case: UC-OFF-001

source_transition:
  from_status: INTERVIEW
  to_status: OFFER

actor:
  type: HR
  id_field: user_id
  fallback: Recruiter

payload:
  application_id:
    type: string
    description: Application ID
    required: true
  event_id:
    type: string
    description: Event ID
    required: true
  track_id:
    type: string
    description: Track ID
    required: true
  student_id:
    type: string
    description: Student ID
    required: true
  offer_details:
    type: object
    description: Chi tiết offer
    properties:
      position: string
      salary: number
      start_date: date
      benefits: array
      expiry_date: date
    required: true
  interview_result:
    type: object
    description: Kết quả interview
    properties:
      score: number
      feedback: string
      interviewer_id: string
    required: true
  offered_at:
    type: datetime
    description: Thời điểm đưa offer
    required: true

affects:
  - aggregate: Application
    id_field: application_id
    mutation: status = OFFER
  - context: Offer
    trigger: TrackOffer
    action: Theo dõi offer acceptance
  - aggregate: Student
    id_field: student_id
    mutation: send_notification("Offer letter")

business_rules:
  - BRS-OFF-001: Offer phải có expiry date
  - BRS-OFF-002: Offer letter phải được gửi trong 3 ngày

outbox:
  enabled: true
  retention_days: 30

---
# Event: ApplicationAccepted
