---
# Event: ApplicationRejected
# Transition: SCREENING/TEST/INTERVIEW/OFFER → REJECTED
# Trigger: Failed at any stage
# Actor: System/Recruiter/Interviewer/HR

event_type: ApplicationRejected
version: "1.0.0"
description: |
  Event được emit khi application bị reject ở bất kỳ stage nào.

  Use Case: UC-APP-007 - Reject Application

  Event này trigger notification cho Student.
category: application.lifecycle
aggregate_root: Application
aggregate_id_field: application_id
correlation_id_field: event_id
causation_id_field: null

trigger:
  type: command
  command: RejectApplication
  use_case: UC-APP-007

source_transition:
  from_status:
    - SCREENING
    - TEST
    - INTERVIEW
    - OFFER
  to_status: REJECTED

actor:
  type: Recruiter
  id_field: user_id
  fallback: System

payload:
  application_id:
    type: string
    description: Application ID
    required: true
  event_id:
    type: string
    description: Event ID
    required: true
  track_id:
    type: string
    description: Track ID
    required: true
  student_id:
    type: string
    description: Student ID
    required: true
  rejection_reason:
    type: string
    description: Lý do reject
    required: true
  rejected_by:
    type: string
    description: User ID người reject
    required: true
  rejected_at:
    type: datetime
    description: Thời điểm reject
    required: true
  stage:
    type: string
    description: Stage bị reject (SCREENING/TEST/INTERVIEW/OFFER)
    enum:
      - SCREENING
      - TEST
      - INTERVIEW
      - OFFER
    required: true

affects:
  - aggregate: Application
    id_field: application_id
    mutation: status = REJECTED
  - aggregate: Student
    id_field: student_id
    mutation: send_notification("Rejection email")
  - aggregate: Event
    id_field: event_id
    mutation: rejected_count++

business_rules:
  - BRS-APP-008: Rejection email phải được gửi trong 24h
  - BRS-APP-009: Reason phải được provide cho rejection

outbox:
  enabled: true
  retention_days: 30

---
# Event: ApplicationWithdrawn
# Transition: SUBMITTED/SCREENING/TEST/INTERVIEW/OFFER → WITHDRAWN
# Trigger: Student withdraws application
# Actor: Student

event_type: ApplicationWithdrawn
version: "1.0.0"
description: |
  Event được emit khi Student withdraw application.

  Use Case: UC-APP-004 - Withdraw Application

  Event này trigger cleanup và notification.
category: application.lifecycle
aggregate_root: Application
aggregate_id_field: application_id
correlation_id_field: event_id
causation_id_field: null

trigger:
  type: command
  command: WithdrawApplication
  use_case: UC-APP-004

source_transition:
  from_status:
    - SUBMITTED
    - SCREENING
    - TEST
    - INTERVIEW
    - OFFER
  to_status: WITHDRAWN

actor:
  type: Student
  id_field: student_id

payload:
  application_id:
    type: string
    description: Application ID
    required: true
  event_id:
    type: string
    description: Event ID
    required: true
  track_id:
    type: string
    description: Track ID
    required: true
  student_id:
    type: string
    description: Student ID
    required: true
  reason:
    type: string
    description: Lý do withdraw
    maxLength: 500
    required: false
  withdrawn_at:
    type: datetime
    description: Thời điểm withdraw
    required: true

affects:
  - aggregate: Application
    id_field: application_id
    mutation: status = WITHDRAWN
  - aggregate: Event
    id_field: event_id
    mutation: withdrawn_count++
  - context: Screening
    trigger: CancelScreening
    action: Hủy screening process (nếu đang screening)

business_rules:
  - BRS-APP-010: Student có thể withdraw bất kỳ lúc nào trước khi accept offer
  - BRS-APP-011: Withdrawn application không thể restore

outbox:
  enabled: true
  retention_days: 30

---
# Event: DuplicateDetected
# Trigger: System detects duplicate applications
# Actor: System

event_type: DuplicateDetected
version: "1.0.0"
description: |
  Event được emit khi system phát hiện duplicate applications.

  Use Case: UC-DUP-001 - Detect Duplicate

  Event này trigger manual review hoặc auto-resolution.
category: duplicate.detection
aggregate_root: Duplicate
aggregate_id_field: duplicate_id
correlation_id_field: event_id
causation_id_field: ApplicationSubmitted.event_id

trigger:
  type: system
  condition: Match found by phone OR student_id OR email
  use_case: UC-DUP-001

source_transition:
  from_status: null
  to_status: PENDING

actor:
  type: System
  id_field: system

payload:
  duplicate_id:
    type: string
    description: Duplicate record ID
    pattern: "^DUP-\\d{6}$"
    required: true
  application_id_1:
    type: string
    description: Application ID thứ 1 (giữ lại)
    required: true
  application_id_2:
    type: string
    description: Application ID thứ 2 (xóa/merge)
    required: true
  match_type:
    type: string
    description: Loại match (PHONE, STUDENT_ID, EMAIL, BOTH)
    enum:
      - PHONE
      - STUDENT_ID
      - EMAIL
      - BOTH
    required: true
  student_id:
    type: string
    description: Student ID trùng
    required: true
  detected_at:
    type: datetime
    description: Thời điểm phát hiện
    required: true
  match_confidence:
    type: number
    description: Độ tin cậy của match (0-1)
    minimum: 0
    maximum: 1
    required: false

affects:
  - aggregate: Duplicate
    id_field: duplicate_id
    mutation: Create duplicate record with status = PENDING
  - aggregate: Application
    id_field: application_id_2
    mutation: flag_for_review = true
  - context: Screening
    trigger: HoldScreening
    action: Tạm dừng screening cho cả 2 applications

business_rules:
  - BRS-DUP-001: Duplicate phải có 2 application IDs khác nhau
  - BRS-DUP-002: application_id_1 là application được giữ lại

outbox:
  enabled: true
  retention_days: 30

---
# Event: DuplicateResolved
# Transition: PENDING/REVIEWING → RESOLVED/IGNORED
# Trigger: Manual review or auto-resolution
# Actor: Admin/Recruiter

event_type: DuplicateResolved
version: "1.0.0"
description: |
  Event được emit khi duplicate được resolve.

  Use Case: UC-DUP-002 - Resolve Duplicate

  Event này trigger cleanup và notification.
category: duplicate.resolution
aggregate_root: Duplicate
aggregate_id_field: duplicate_id
correlation_id_field: DuplicateDetected.event_id
causation_id_field: null

trigger:
  type: command
  command: ResolveDuplicate
  use_case: UC-DUP-002

source_transition:
  from_status:
    - PENDING
    - REVIEWING
  to_status:
    - RESOLVED
    - IGNORED

actor:
  type: Admin
  id_field: user_id
  fallback: Recruiter

payload:
  duplicate_id:
    type: string
    description: Duplicate record ID
    required: true
  application_id_1:
    type: string
    description: Application ID thứ 1
    required: true
  application_id_2:
    type: string
    description: Application ID thứ 2
    required: true
  status:
    type: string
    description: Status sau resolve (RESOLVED/IGNORED)
    enum:
      - RESOLVED
      - IGNORED
    required: true
  resolution_method:
    type: string
    description: Phương thức resolve (REMOVE, MERGE, NO_ACTION)
    enum:
      - REMOVE
      - MERGE
      - NO_ACTION
    required: true
  resolved_by:
    type: string
    description: User ID resolve
    required: true
  resolved_at:
    type: datetime
    description: Thời điểm resolve
    required: true
  notes:
    type: string
    description: Ghi chú khi resolve
    required: false

affects:
  - aggregate: Duplicate
    id_field: duplicate_id
    mutation: status = RESOLVED/IGNORED, resolved_at = now()
  - aggregate: Application
    id_field: application_id_2
    mutation: Depends on resolution_method
  - context: Screening
    trigger: ResumeScreening
    action: Tiếp tục screening cho application được giữ lại

business_rules:
  - BRS-DUP-002: application_id_1 là application được giữ lại

outbox:
  enabled: true
  retention_days: 30

---
# Metadata
# This file defines all domain events for the Application context.
#
# Event Sourcing:
# - All events are immutable
# - Events are stored in order of occurrence
# - Events can be replayed to reconstruct state
#
# Event Bus:
# - Events are published to the event bus
# - Other contexts subscribe to relevant events
# - Events are used for inter-context communication
#
# CQRS:
# - Events trigger command handlers
# - Commands mutate aggregates
# - Events are projected to read models
