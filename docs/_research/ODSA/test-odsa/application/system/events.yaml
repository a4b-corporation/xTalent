category: application.lifecycle
aggregate_root: Application
aggregate_id_field: application_id
correlation_id_field: event_id
causation_id_field: ApplicationOffered.event_id

trigger:
  type: command
  command: AcceptOffer
  use_case: UC-OFF-002

source_transition:
  from_status: OFFER
  to_status: ACCEPTED

actor:
  type: Student
  id_field: student_id

payload:
  application_id:
    type: string
    description: Application ID
    required: true
  event_id:
    type: string
    description: Event ID
    required: true
  track_id:
    type: string
    description: Track ID
    required: true
  student_id:
    type: string
    description: Student ID
    required: true
  accepted_at:
