# Domain Events - Application Context
# Bounded Context: Application (ATS)
# Generated from: 5.ontology/application/*.yaml
#
# Lifecycle: DRAFT → SUBMITTED → SCREENING → TEST → INTERVIEW → OFFER → ACCEPTED/REJECTED/WITHDRAWN

---
# Event: ApplicationSubmitted
# Transition: DRAFT → SUBMITTED
# Trigger: Student submit application
# Actor: Student

event_type: ApplicationSubmitted
version: "1.0.0"
description: |
  Event được emit khi Student submit application vào Event/Track.

  Use Case: UC-APP-001 - Submit Application

  Event này trigger Screening context để bắt đầu quá trình screening.
category: application.lifecycle
aggregate_root: Application
aggregate_id_field: application_id
correlation_id_field: event_id
causation_id_field: null

trigger:
  type: command
  command: SubmitApplication
  use_case: UC-APP-001

source_transition:
  from_status: DRAFT
  to_status: SUBMITTED

actor:
  type: Student
  id_field: student_id

payload:
  application_id:
    type: string
    description: Application ID
    pattern: "^APP-\\d{6}$"
    required: true
  event_id:
    type: string
    description: Event ID mà Student apply vào
    required: true
  track_id:
    type: string
    description: Track ID mà Student apply vào
    required: true
  student_id:
    type: string
    description: Student ID người apply
    pattern: "^STU-\\d{6}$"
    required: true
  submitted_at:
    type: datetime
    description: Thời điểm submit
    required: true
  form_field_values:
    type: array
    description: Dynamic form field values
    items:
      type: object
      properties:
        field_name: string
        field_value: string
    required: false
  question_answers:
    type: array
    description: Question answers for Track
    items:
      type: object
      properties:
        question_id: string
        answer_text: string
    required: false
  attachment_ids:
    type: array
    description: List of attachment IDs
    items:
      type: string
    required: false

affects:
  - aggregate: Application
    id_field: application_id
    mutation: status = SUBMITTED, submitted_at = now()
  - aggregate: Event
    id_field: event_id
    mutation: application_count++
  - context: Screening
    trigger: StartScreeningProcess
    action: Tạo screening record cho application

business_rules:
  - BRS-APP-001: Chỉ được apply khi Event đang active
  - BRS-APP-002: Student chỉ được apply 1 Track/Event
  - BRS-APP-003: Student không được apply cùng 1 Event nhiều lần

outbox:
  enabled: true
  retention_days: 30

---
# Event: ApplicationScreened
# Transition: SUBMITTED → SCREENING
# Trigger: System auto move to screening
# Actor: System

event_type: ApplicationScreened
version: "1.0.0"
description: |
  Event được emit khi application được move sang trạng thái SCREENING.

  Use Case: UC-SCR-001 - Start Screening

  Event này trigger Screening context để bắt đầu đánh giá application.
category: application.lifecycle
aggregate_root: Application
aggregate_id_field: application_id
correlation_id_field: event_id
causation_id_field: ApplicationSubmitted.event_id

trigger:
  type: system
  condition: Application.status = SUBMITTED AND Event.screening_enabled = true
  use_case: UC-SCR-001

source_transition:
  from_status: SUBMITTED
  to_status: SCREENING

actor:
  type: System
  id_field: system

payload:
  application_id:
    type: string
    description: Application ID
    required: true
  event_id:
    type: string
    description: Event ID
    required: true
  track_id:
    type: string
    description: Track ID
    required: true
  student_id:
    type: string
    description: Student ID
    required: true
  screened_at:
    type: datetime
    description: Thời điểm move sang screening
    required: true
  screening_criteria:
    type: object
    description: Criteria được dùng để screening
    required: false

affects:
  - aggregate: Application
    id_field: application_id
    mutation: status = SCREENING
  - context: Screening
    trigger: EvaluateApplication
    action: Bắt đầu đánh giá application theo criteria

business_rules:
  - BRS-SCR-001: Screening criteria phải được define trước
  - BRS-SCR-002: Auto-screening phải hoàn thành trong 24h

outbox:
  enabled: true
  retention_days: 30

---
# Event: ApplicationMovedToTest
# Transition: SCREENING → TEST
# Trigger: Screening passed
# Actor: System/Recruiter

event_type: ApplicationMovedToTest
version: "1.0.0"
description: |
  Event được emit khi application vượt qua vòng screening và được move sang TEST.

  Use Case: UC-TST-001 - Schedule Test

  Event này trigger Test Session context để lên lịch test cho application.
category: application.lifecycle
aggregate_root: Application
aggregate_id_field: application_id
correlation_id_field: event_id
causation_id_field: ApplicationScreened.event_id

trigger:
  type: command
  command: PassScreening
  use_case: UC-TST-001

source_transition:
  from_status: SCREENING
  to_status: TEST

actor:
  type: Recruiter
  id_field: user_id
  fallback: System

payload:
  application_id:
    type: string
    description: Application ID
    required: true
  event_id:
    type: string
    description: Event ID
    required: true
  track_id:
    type: string
    description: Track ID
    required: true
  student_id:
    type: string
    description: Student ID
    required: true
  screening_result:
    type: object
    description: Kết quả screening
    properties:
      score: number
      passed: boolean
      notes: string
    required: true
  moved_at:
    type: datetime
    description: Thời điểm move sang test
    required: true

affects:
  - aggregate: Application
    id_field: application_id
    mutation: status = TEST
  - context: TestSession
    trigger: ScheduleTest
    action: Lên lịch test cho application
  - aggregate: Student
    id_field: student_id
    mutation: send_notification("Test invitation")

business_rules:
  - BRS-TST-001: Test phải được schedule trong vòng 7 ngày
  - BRS-TST-002: Student phải nhận được email mời test

outbox:
  enabled: true
  retention_days: 30

---
