    description: Application ID
    required: true
  event_id:
    type: string
    description: Event ID
    required: true
  track_id:
    type: string
    description: Track ID
    required: true
  student_id:
    type: string
    description: Student ID
    required: true
  test_result:
    type: object
    description: Kết quả test
    properties:
