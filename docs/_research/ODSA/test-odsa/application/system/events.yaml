aggregate_root: Application
aggregate_id_field: application_id
correlation_id_field: event_id
causation_id_field: ApplicationMovedToTest.event_id

trigger:
  type: command
  command: PassTest
  use_case: UC-INT-001

source_transition:
  from_status: TEST
  to_status: INTERVIEW

actor:
  type: Interviewer
  id_field: user_id
  fallback: System

payload:
  application_id:
