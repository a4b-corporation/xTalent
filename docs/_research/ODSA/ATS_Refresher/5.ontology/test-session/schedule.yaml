id: https://xtalent.io/ontology/ats/test-session/schedule
name: schedule_ontology
version: "1.0.0"
description: "Schedule - Lịch thi của Student trong Test Session"

prefixes:
  xt: https://xtalent.io/ontology/
  oracle: https://oracle.com/hcm/
  sap: https://successfactors.sap.com/
  workday: https://workday.com/

default_range: string

slots:
  # --- Identifier ---
  schedule_id:
    description: "Unique identifier cho Schedule"
    identifier: true
    required: true
    pattern: "^TSCH-\\d{6}$"
    annotations:
      example: "TSCH-000001"

  # --- Core Fields ---
  slot_id:
    description: "TestSlot ID mà Student được chia"
    required: true
    annotations:
      reference: "TestSlot.slot_id"

  application_id:
    description: "Application ID của Student"
    required: true
    annotations:
      reference: "Application.application_id"

  candidate_rr_id:
    description: "Candidate RR ID"
    required: true
    annotations:
      reference: "CandidateRR.candidate_rr_id"

  sbd:
    description: "Số báo danh (auto gen khi được chia vào slot)"
    required: false

  status:
    description: "Trạng thái lịch thi"
    range: ScheduleStatusEnum
    required: true

  confirmed_at:
    description: "Thời điểm confirm tham gia"
    range: datetime
    required: false

  confirm_deadline:
    description: "Deadline confirm (Time Window, configurable)"
    range: datetime
    required: false

  change_count:
    description: "Số lần đổi lịch (max 1 lần)"
    range: integer
    minimum_value: 0
    maximum_value: 2
    required: false

  # --- Audit Fields ---
  created_by:
    description: "System auto tạo"
    required: true

  created_at:
    description: "Timestamp tạo Schedule"
    range: datetime
    required: true

  updated_at:
    description: "Timestamp cập nhật Schedule"
    range: datetime
    required: false

classes:
  Schedule:
    description: |
      Schedule - Lịch thi của Student trong Test Session.
      Auto gen SBD khi Student được chia vào slot.
      Student chỉ được đổi lịch 1 lần, lần thứ 2 chỉ còn Yes/No options.
      Aggregate Root trong Test Session context.

    annotations:
      oracle_hcm_term: "TestSchedule"
      sap_term: "TestSchedule"
      workday_term: "TestSchedule"
      disambiguation: "xTalent: Schedule = Lịch thi Onsite. Oracle: TestSchedule. SAP: TestSchedule. Workday: TestSchedule. Xem docs.xtalent.io/ats/test-session/schedule."

      module: "ats"
      sub_module: "test-session"
      version: "1.0.0"
      bounded_context: "Test Session"
      aggregate_root: true

      ouroboros_evolution:
        iteration: "1.0.0"
        parent_version: null
        evaluation_status: "pending"
        last_evaluated: null
        evolution_notes: "Initial version"

      validation_hooks:
        odds_system_builder:
          required_for: true
          validates: ["table_generation", "fk_references"]

      see_also: "https://docs.xtalent.io/ats/test-session/schedule"

    slots:
      - schedule_id
      - slot_id
      - application_id
      - candidate_rr_id
      - sbd
      - status
      - confirmed_at
      - confirm_deadline
      - change_count
      - created_by
      - created_at
      - updated_at

    slot_usage:
      schedule_id:
        required: true
        identifier: true

      slot_id:
        required: true

      application_id:
        required: true

      candidate_rr_id:
        required: true

      status:
        required: true

      created_by:
        required: true

      created_at:
        required: true

    rules:
      - description: "BRS-TSCH-001: Auto gen SBD khi Student được chia vào slot"
        preconditions:
          slot_conditions:
            slot_id:
              slot_value_conditions: {}
        postconditions:
          slot_conditions:
            sbd:
              pattern: "^SBD-\\d{8}$"

      - description: "BRS-TSCH-002: Student chỉ được đổi lịch 1 lần"
        preconditions:
          slot_conditions:
            change_count:
              minimum_value: 1
        postconditions:
          slot_conditions:
            change_request_allowed:
              equals_boolean: false

      - description: "BRS-TSCH-003: Lần đổi thứ 2 chỉ còn Yes/No options"
        preconditions:
          slot_conditions:
            change_count:
              minimum_value: 1
        postconditions:
          slot_conditions:
            change_options:
              equals_string: "YES_NO_ONLY"

# === ENUMS ===
enums:
  ScheduleStatusEnum:
    description: "Trạng thái lịch thi"
    permissible_values:
      PENDING:
        description: "Chưa confirm"
      CONFIRMED:
        description: "Đã confirm"
      RESCHEDULED:
        description: "Đã đổi lịch"
      COMPLETED:
        description: "Hoàn tất"
      NO_SHOW:
        description: "Không đến"
      CANCELLED:
        description: "Đã hủy"
