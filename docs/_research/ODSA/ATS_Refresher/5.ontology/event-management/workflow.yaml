id: https://xtalent.io/ontology/ats/event-management/workflow
name: workflow_ontology
version: "1.0.0"
description: "Workflow cấu hình các vòng tuyển dụng cho Event"

prefixes:
  xt: https://xtalent.io/ontology/
  oracle: https://oracle.com/hcm/
  sap: https://successfactors.sap.com/
  workday: https://workday.com/

default_range: string

slots:
  # --- Identifier ---
  workflow_id:
    description: "Unique identifier cho Workflow"
    identifier: true
    required: true
    pattern: "^WFL-\\d{6}$"
    annotations:
      example: "WFL-000001"

  # --- Core Fields ---
  event_id:
    description: "Event ID mà Workflow áp dụng"
    required: true
    annotations:
      reference: "Event.event_id"

  workflow_name:
    description: "Tên Workflow"
    required: true

  rounds:
    description: "Danh sách các vòng tuyển dụng theo thứ tự"
    range: WorkflowRound
    multivalued: true
    inlined: true
    required: true

  skipped_rounds:
    description: "Danh sách các vòng được skip (nếu có)"
    range: string
    multivalued: true
    inlined: false
    required: false

  status:
    description: "Trạng thái Workflow"
    range: WorkflowStatusEnum
    required: true

  # --- Audit Fields ---
  created_by:
    description: "User ID tạo Workflow"
    required: true
    annotations:
      reference: "User.user_id"

  created_at:
    description: "Timestamp tạo Workflow"
    range: datetime
    required: true

  updated_at:
    description: "Timestamp cập nhật Workflow"
    range: datetime
    required: false

classes:
  Workflow:
    description: |
      Workflow cấu hình trình tự các vòng tuyển dụng cho Event.
      Cho phép skip một số vòng nếu cần.
      Aggregate Root trong Event Management context.

    annotations:
      oracle_hcm_term: "RecruitingWorkflow"
      sap_term: "RecruitingWorkflow"
      workday_term: "RecruitingWorkflow"
      disambiguation: "xTalent: Workflow = Trình tự vòng tuyển dụng. Oracle: RecruitingWorkflow. SAP: RecruitingWorkflow. Workday: RecruitingWorkflow. Xem docs.xtalent.io/ats/event-management/workflow."

      module: "ats"
      sub_module: "event-management"
      version: "1.0.0"
      bounded_context: "Event Management"
      aggregate_root: true

      ouroboros_evolution:
        iteration: "1.0.0"
        parent_version: null
        evaluation_status: "pending"
        last_evaluated: null
        evolution_notes: "Initial version"

      validation_hooks:
        odds_system_builder:
          required_for: true
          validates: ["table_generation", "fk_references"]

      see_also: "https://docs.xtalent.io/ats/event-management/workflow"

    slots:
      - workflow_id
      - event_id
      - workflow_name
      - rounds
      - skipped_rounds
      - status
      - created_by
      - created_at
      - updated_at

    slot_usage:
      workflow_id:
        required: true
        identifier: true

      event_id:
        required: true

      workflow_name:
        required: true

      rounds:
        required: true

      status:
        required: true

      created_by:
        required: true

      created_at:
        required: true

    rules:
      - description: "BRS-EM-WFL-001: Workflow phải có ít nhất 1 vòng đánh giá (Test hoặc Interview)"
        preconditions:
          slot_conditions: {}
        postconditions:
          slot_conditions:
            rounds:
              list_has_length:
                min_length: 1

      - description: "BRS-EM-WFL-002: Vòng skipped phải tồn tại trong rounds"
        preconditions:
          slot_conditions:
            skipped_rounds:
              list_has_length:
                min_length: 1
        postconditions:
          slot_conditions:
            rounds:
              list_contains_all_of: "skipped_rounds"

# === ENUMS ===
enums:
  WorkflowStatusEnum:
    description: "Trạng thái Workflow"
    permissible_values:
      DRAFT:
        description: "Workflow đang nháp"
      ACTIVE:
        description: "Workflow đang active"
      INACTIVE:
        description: "Workflow không còn active"

  WorkflowRound:
    description: "Các vòng tuyển dụng có thể có"
    permissible_values:
      SCREENING:
        description: "Vòng screening applications"
      ONLINE_TEST:
        description: "Vòng Online Test (Assignment)"
      ONSITE_TEST:
        description: "Vòng Onsite Test"
      INTERVIEW:
        description: "Vòng Phỏng vấn"
      OFFER:
        description: "Vòng Offer"
